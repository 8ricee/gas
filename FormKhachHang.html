<div id="section-khachHang" class="form-section">
  <h2>Thêm khách hàng</h2>

  <div class="form-group">
    <label>Họ tên <span class="required">*</span></label>
    <input type="text" id="kh-hoTen" placeholder="Nguyen Van A">
  </div>

  <div class="form-group">
    <label>Số điện thoại <span class="required">*</span></label>
    <input type="text" id="kh-soDienThoai" placeholder="0901234567">
  </div>

  <div class="form-group">
    <label>CCCD</label>
    <input type="text" id="kh-cccd" placeholder="Số căn cước công dân">
  </div>

  <div class="form-group">
    <label>Địa chỉ</label>
    <input type="text" id="kh-diaChi" placeholder="Địa chỉ">
  </div>

  <div class="form-group">
    <label>Ghi chú</label>
    <textarea id="kh-ghiChu" placeholder="Ghi chú..."></textarea>
  </div>

  <button class="btn btn-primary" id="btnThemKH" onclick="submitKhachHang()">
    Thêm khách hàng
  </button>
</div>
