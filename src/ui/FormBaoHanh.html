<div id="section-baoHanh" class="form-section">
  <h2>Bảo hành & Sửa chữa</h2>

  <div class="form-group">
    <label>Chi nhánh tiếp nhận <span class="required">*</span></label>
    <select id="bh-chiNhanh">
      <option value="">-- Chọn chi nhánh --</option>
    </select>
  </div>

  <div class="form-group">
    <label>Loại dịch vụ <span class="required">*</span></label>
    <select id="bh-loaiDichVu" onchange="onLoaiDichVuBHChange()">
      <option value="Sửa chữa">Sửa chữa</option>
      <option value="Bảo hành">Bảo hành</option>
    </select>
  </div>

  <div class="form-group">
    <label>Khách hàng <span class="required">*</span></label>
    <input type="text" id="bh-maKH" list="bh-maKH-list" placeholder="Khách hàng...">
    <datalist id="bh-maKH-list"></datalist>
  </div>

  <div class="form-group">
    <label>Tên sản phẩm <span class="required">*</span></label>
    <input type="text" id="bh-tenSP" placeholder="Tên điện thoại / phụ kiện">
  </div>

  <div class="form-group">
    <label>Tình trạng lỗi <span class="required">*</span></label>
    <textarea id="bh-tinhTrangLoi" placeholder="Mô tả chi tiết tình trạng lỗi"></textarea>
  </div>

  <div class="form-group">
    <label>Phí sửa chữa</label>
    <input type="number" id="bh-phiSuaChua" value="0" oninput="updateSplitPaymentAmounts('bh')">
  </div>

  <div class="form-group">
    <label>Hình thức thanh toán</label>
    <select id="bh-hinhThucTT" onchange="onPaymentMethodChange('bh')">
      <option value="Tiền mặt">Tiền mặt</option>
      <option value="Chuyển khoản">Chuyển khoản</option>
      <option value="Quẹt thẻ (POS)">Quẹt thẻ (POS)</option>
      <option value="Hỗn hợp">Hỗn hợp</option>
    </select>
  </div>

  <div id="bh-split-payment-row" class="form-row" style="display:none; background: #e8f0fe; padding: 8px; border-radius: 4px; margin-bottom: 12px; border: 1px solid #a8c7fa;">
    <div class="form-group" style="margin-bottom: 0;">
      <label style="color: #1a73e8; font-weight: bold;">Số tiền mặt</label>
      <input type="number" id="bh-split-tienMat" value="0" oninput="validateSplitPayment('bh')">
    </div>
    <div class="form-group" style="margin-bottom: 0;">
      <label style="color: #1a73e8; font-weight: bold;">Số tiền chuyển khoản</label>
      <input type="number" id="bh-split-chuyenKhoan" value="0" oninput="validateSplitPayment('bh')">
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Người tiếp nhận <span class="required">*</span></label>
      <input type="text" id="bh-nguoiTiepNhan" list="bh-nguoiTiepNhan-list" placeholder="Chọn nhân viên">
      <datalist id="bh-nguoiTiepNhan-list"></datalist>
    </div>
    <div class="form-group">
      <label>Người sửa</label>
      <input type="text" id="bh-nguoiSua" list="bh-nguoiSua-list" placeholder="Kỹ thuật viên">
      <datalist id="bh-nguoiSua-list"></datalist>
    </div>
  </div>

  <div class="form-group">
    <label>Ghi chú thêm</label>
    <textarea id="bh-ghiChu" placeholder="Mật khẩu máy, phụ kiện đi kèm..."></textarea>
  </div>

  <button class="btn btn-primary" id="btnTaoBH" onclick="submitBaoHanh()">
    Tạo Phiếu Tiếp Nhận
  </button>
</div>
