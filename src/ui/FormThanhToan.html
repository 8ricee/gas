<div id="section-thanhToan" class="form-section">
  <h2>Ghi nhận thanh toán trả góp</h2>

  <div class="form-group">
    <label>Hợp đồng trả góp <span class="required">*</span></label>
    <input type="text" id="tt-maTG" list="tt-maTG-list" oninput="onHopDongChange()" placeholder="Hợp đồng trả góp">
    <datalist id="tt-maTG-list"></datalist>
  </div>

  <div class="form-group">
    <label>Kỳ thanh toán <span class="required">*</span></label>
    <input type="text" id="tt-kySo" list="tt-kySo-list" placeholder="Chọn hoặc nhập kỳ...">
    <datalist id="tt-kySo-list"></datalist>
  </div>

  <div class="form-group">
    <label>Số tiền thanh toán <span class="required">*</span></label>
    <input type="number" id="tt-soTien" value="0" oninput="updateSplitPaymentAmounts('tt')">
  </div>

  <div class="form-group">
    <label>Hình thức thanh toán</label>
    <select id="tt-hinhThucTT" onchange="onPaymentMethodChange('tt')">
      <option value="Tiền mặt">Tiền mặt</option>
      <option value="Chuyển khoản">Chuyển khoản</option>
      <option value="Quẹt thẻ (POS)">Quẹt thẻ (POS)</option>
      <option value="Hỗn hợp">Hỗn hợp</option>
    </select>
  </div>

  <div id="tt-split-payment-row" class="form-row" style="display:none; background: #e8f0fe; padding: 8px; border-radius: 4px; margin-bottom: 12px; border: 1px solid #a8c7fa;">
    <div class="form-group" style="margin-bottom: 0;">
      <label style="color: #1a73e8; font-weight: bold;">Số tiền mặt</label>
      <input type="number" id="tt-split-tienMat" value="0" oninput="validateSplitPayment('tt')">
    </div>
    <div class="form-group" style="margin-bottom: 0;">
      <label style="color: #1a73e8; font-weight: bold;">Số tiền chuyển khoản</label>
      <input type="number" id="tt-split-chuyenKhoan" value="0" oninput="validateSplitPayment('tt')">
    </div>
  </div>

  <div class="form-group">
    <label>Ghi chú</label>
    <textarea id="tt-ghiChu" placeholder="Ghi chú..."></textarea>
  </div>

  <button class="btn btn-primary" id="btnThanhToan" onclick="submitThanhToan()">
    Ghi nhận thanh toán
  </button>
</div>
