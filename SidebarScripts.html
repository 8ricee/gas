<script>
  // escapeHtml helper to prevent XSS
  function escapeHtml(text) {
    if (text === null || text === undefined) return "";
    let map = {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    };
    return String(text).replace(/[&<>"']/g, function(m) { return map[m]; });
  }
  // ==================== NAV TABS ====================
  document.querySelectorAll('.nav-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      // Update active tab
      document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');

      // Show corresponding section
      let sectionId = 'section-' + this.dataset.section;
      document.querySelectorAll('.form-section').forEach(function(s) { s.classList.remove('active'); });
      let activeSec = document.getElementById(sectionId);
      if (activeSec) activeSec.classList.add('active');

      hideAlert();
    });
  });

  // ==================== ALERT ====================
  function showAlertMsg(type, msg) {
    let box = document.getElementById('alertBox');
    box.className = 'alert alert-' + type + ' show';
    if (type === 'success' || type === 'info') {
      box.innerHTML = msg;
    } else {
      box.textContent = msg;
    }
    // Auto hide after 5s for success
    if (type === 'success') {
      setTimeout(function() { box.classList.remove('show'); }, 5000);
    }
  }

  // Helper to append options with Vietnamese accents for datalist and selectors
  function hideAlert() {
    document.getElementById('alertBox').classList.remove('show');
  }

  // ==================== LOADING ====================
  function setLoading(btnId, loading) {
    let btn = document.getElementById(btnId);
    if (!btn) return;
    if (loading) {
      btn.disabled = true;
      btn.dataset.originalText = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span> Đang xử lý...';
    } else {
      btn.disabled = false;
      btn.innerHTML = btn.dataset.originalText || btn.innerHTML;
    }
  }

  let branchesCached = [];
  let localCache = {
    dienThoai: [],
    phuKien: [],
    phuKienUnique: [],
    khachHang: null
  };

  function removeAccents(str) {
    if (!str) return '';
    return str.normalize('NFD')
              .replace(/[\u0300-\u036f]/g, '')
              .replace(/đ/g, 'd')
              .replace(/Đ/g, 'D');
  }

  function matchSearchKeyword(text, keyword) {
    if (!text || !keyword) return false;
    let normText = removeAccents(text.toLowerCase());
    let normKeyword = removeAccents(keyword.toLowerCase());
    let words = normKeyword.split(/\s+/).filter(Boolean);
    return words.every(function(word) {
      return normText.indexOf(word) !== -1;
    });
  }

  function searchDienThoaiLocal(branch, keyword) {
    if (!branch) return [];
    let items = localCache.dienThoai || [];
    return items.filter(function(item) {
      if (String(item.chiNhanh || "").toLowerCase() !== String(branch).toLowerCase()) {
        return false;
      }
      if (!keyword) return true;
      return matchSearchKeyword(item.text, keyword) || matchSearchKeyword(item.value, keyword);
    });
  }

  function searchKhachHangLocal(keyword) {
    let items = localCache.khachHang || [];
    if (!keyword) return items.slice(0, 100);
    return items.filter(function(item) {
      return matchSearchKeyword(item.text, keyword) || matchSearchKeyword(item.value, keyword);
    }).slice(0, 100);
  }

  function searchPhuKienLocal(branch, keyword) {
    if (!branch) return [];
    let items = localCache.phuKien || [];
    return items.filter(function(item) {
      if (String(item.chiNhanh || "").toLowerCase() !== String(branch).toLowerCase()) {
        return false;
      }
      if (!keyword) return true;
      return matchSearchKeyword(item.text, keyword) || matchSearchKeyword(item.value, keyword);
    });
  }

  function searchPhuKienUniqueLocal(keyword) {
    let items = localCache.phuKienUnique || [];
    if (!keyword) return items;
    return items.filter(function(item) {
      return matchSearchKeyword(item.text, keyword) || matchSearchKeyword(item.value, keyword);
    });
  }

  function preloadInventoryData(callback) {
    google.script.run.withSuccessHandler(function(data) {
      if (data) {
        localCache.dienThoai = data.dienThoai || [];
        localCache.phuKien = data.phuKien || [];
        localCache.phuKienUnique = data.phuKienUnique || [];
        window.storeInterestRate = data.storeInterestRate || 0;
      }
      if (callback) callback();
    }).getPreloadData();
  }

  function refreshSystemData(e) {
    if (e) e.stopPropagation();
    let btn = e ? e.target : null;
    let originalHTML = btn ? btn.innerHTML : "Làm mới";
    if (btn) {
      btn.innerHTML = 'Đang nạp';
      btn.style.pointerEvents = 'none';
      btn.style.opacity = '0.6';
    }
    showAlertMsg('info', 'Đang làm mới bộ nhớ đệm hệ thống...');
    google.script.run.withSuccessHandler(function() {
      preloadInventoryData(function() {
        if (btn) {
          btn.innerHTML = originalHTML;
          btn.style.pointerEvents = 'auto';
          btn.style.opacity = '1';
        }
        showAlertMsg('success', 'Đã làm mới bộ nhớ đệm thành công!');
        if (typeof onDonHangBranchOrNguonChange === 'function') {
          onDonHangBranchOrNguonChange();
        }
      });
    }).clearAllCaches();
  }

  let originalOrderPrice = 0;
  let originalOrderData = null;

  // ==================== INIT — LOAD DATA ====================
  function init() {
    // Set default month/year for Doanh số
    let now = new Date();
    let curMonth = now.getMonth() + 1;
    let curYear = now.getFullYear();
    let dsThang = document.getElementById('ds-thang');
    if (dsThang) dsThang.value = curMonth;
    let dsNam = document.getElementById('ds-nam');
    if (dsNam) dsNam.value = curYear;

    // Load all initial metadata and inventory preloads in a single combined request
    google.script.run.withSuccessHandler(function(data) {
      if (!data) return;

      // 1. Inventory preload data
      if (data.preloadData) {
        localCache.dienThoai = data.preloadData.dienThoai || [];
        localCache.phuKien = data.preloadData.phuKien || [];
        localCache.phuKienUnique = data.preloadData.phuKienUnique || [];
      }

      // Lưu trữ lãi suất trả góp cửa hàng
      window.storeInterestRate = data.storeInterestRate || 0;

      // 2. Branches
      if (data.branches) {
        branchesCached = data.branches;
        populateSelect('dh-chiNhanh', data.branches);
        populateSelect('nk-chiNhanh', data.branches);
        populateSelect('dv-chiNhanh', data.branches);
        populateSelect('ck-cnNguon', data.branches);
        populateSelect('ck-cnDich', data.branches);
        populateSelect('dt-chiNhanh', data.branches);
        populateSelect('tm-chiNhanh', data.branches);
        populateSelect('bh-chiNhanh', data.branches);
      }

      // 3. Staff (Employees)
      if (data.staff) {
        populateDatalist('dh-nguoiBan', 'dh-nguoiBan-list', data.staff);
        populateDatalist('dh-nguoiHoTro', 'dh-nguoiHoTro-list', data.staff, true);
        populateDatalist('dv-nguoiThucHien', 'dv-nguoiThucHien-list', data.staff);
        populateDatalist('dt-nguoiThucHien', 'dt-nguoiThucHien-list', data.staff);
        populateDatalist('tm-nguoiThucHien', 'tm-nguoiThucHien-list', data.staff);
        populateDatalist('tm-nguoiHoTro', 'tm-nguoiHoTro-list', data.staff, true);
        populateDatalist('bh-nguoiTiepNhan', 'bh-nguoiTiepNhan-list', data.staff);
        populateDatalist('bh-nguoiSua', 'bh-nguoiSua-list', data.staff);
      }

      // 4. Finance companies
      if (data.financeCompanies) {
        populateSelect('tg-congTyTC', data.financeCompanies);
        populateSelect('tm-tg-congTyTC', data.financeCompanies);
      }

      // 5. Brands
      if (data.brands) {
        populateSelect('nk-thuongHieu', data.brands);
        populateSelect('tm-thuongHieu-Thu', data.brands);
      }

      // Load initial mode tab (needs to run after populate select/datalists)
      if (typeof initialMode !== 'undefined' && initialMode) {
        let activeTab = document.querySelector('.nav-tab[data-section="' + initialMode + '"]');
        if (activeTab) {
          activeTab.click();
        }
      }
    }).getInitialSidebarData();

    // Preload khách hàng trong background sau 1.5 giây để tìm kiếm nhanh
    setTimeout(function() {
      google.script.run.withSuccessHandler(function(items) {
        localCache.khachHang = items || [];
      }).getKhachHangDropdown();
    }, 1500);

    // Set up dynamic search (>= 4 characters, or local search if cached) for large datasets
    setupDatalistSearch('dh-maKH', 'dh-maKH-list', function(query, callback) {
      if (localCache.khachHang) {
        callback(searchKhachHangLocal(query));
      } else {
        google.script.run.withSuccessHandler(callback).getKhachHangDropdownSearch(query);
      }
    });
    setupDatalistSearch('tm-maKH', 'tm-maKH-list', function(query, callback) {
      if (localCache.khachHang) {
        callback(searchKhachHangLocal(query));
      } else {
        google.script.run.withSuccessHandler(callback).getKhachHangDropdownSearch(query);
      }
    });
    setupDatalistSearch('bh-maKH', 'bh-maKH-list', function(query, callback) {
      if (localCache.khachHang) {
        callback(searchKhachHangLocal(query));
      } else {
        google.script.run.withSuccessHandler(callback).getKhachHangDropdownSearch(query);
      }
    });
    setupDatalistSearch('dv-maKH', 'dv-maKH-list', function(query, callback) {
      if (localCache.khachHang) {
        callback(searchKhachHangLocal(query));
      } else {
        google.script.run.withSuccessHandler(callback).getKhachHangDropdownSearch(query);
      }
    });
    setupDatalistSearch('dh-maSP', 'dh-maSP-list', function(query, callback) {
      let branch = document.getElementById('dh-chiNhanh').value;
      let source = document.getElementById('dh-nguonSP').value;
      if (!branch) return callback([]);
      if (source === 'Điện thoại') {
        callback(searchDienThoaiLocal(branch, query));
      } else {
        callback(searchPhuKienLocal(branch, query));
      }
    });
    setupDatalistSearch('ck-maSP', 'ck-maSP-list', function(query, callback) {
      let branch = document.getElementById('ck-cnNguon').value;
      if (!branch) return callback([]);
      callback(searchDienThoaiLocal(branch, query));
    });
    setupDatalistSearch('dt-maSP-Nhan', 'dt-maSP-Nhan-list', function(query, callback) {
      let branch = document.getElementById('dt-chiNhanh').value;
      if (!branch) return callback([]);
      let doiTuong = document.getElementById('dt-doiTuong').value;
      if (doiTuong === 'Quà tặng kèm') {
        callback(searchPhuKienLocal(branch, query));
      } else {
        let loaiGD = document.getElementById('dt-loaiGD').value;
        if (loaiGD === 'Đổi máy') {
          callback(searchDienThoaiLocal(branch, query));
        } else {
          callback(searchPhuKienLocal(branch, query));
        }
      }
    });
    setupDatalistSearch('tm-maSP-Moi', 'tm-maSP-Moi-list', function(query, callback) {
      let branch = document.getElementById('tm-chiNhanh').value;
      if (!branch) return callback([]);
      callback(searchDienThoaiLocal(branch, query));
    });
    setupDatalistSearch('tt-maTG', 'tt-maTG-list', function(query, callback) {
      google.script.run.withSuccessHandler(callback).getTraGopDropdownSearch(query);
    });
    setupDatalistSearch('nk-pkCu-maSP', 'nk-pkCu-maSP-list', function(query, callback) {
      callback(searchPhuKienUniqueLocal(query));
    });

    setupMultiSelectDatalist('dh-maQuaTang', 'dh-maQuaTang-list');
    setupMultiSelectDatalist('tm-maQuaTang', 'tm-maQuaTang-list');
  }

  function loadPhuKienCuDropdown() {
    let items = localCache.phuKienUnique || [];
    populateDatalist('nk-pkCu-maSP', 'nk-pkCu-maSP-list', items);
  }

  function loadTraGopDropdown() {
    google.script.run.withSuccessHandler(function(items) {
      populateDatalist('tt-maTG', 'tt-maTG-list', items);
    }).getTraGopDropdown();
  }

  function populateSelect(selectId, items, addEmpty) {
    let sel = document.getElementById(selectId);
    if (!sel) return;
    let firstOption = sel.options[0];
    sel.innerHTML = '';
    if (firstOption) {
      sel.appendChild(firstOption);
    }

    if (addEmpty) {
      let emptyOpt = document.createElement('option');
      emptyOpt.value = '';
      emptyOpt.textContent = '-- Không --';
      sel.insertBefore(emptyOpt, sel.firstChild);
    }

    items.forEach(function(item) {
      let opt = document.createElement('option');
      opt.value = item.value;
      opt.textContent = item.text;
      if (item.giaBan !== undefined) opt.dataset.giaBan = item.giaBan;
      if (item.giaTraGop !== undefined) opt.dataset.giaTraGop = item.giaTraGop;
      if (item.soTienCanTra !== undefined) opt.dataset.soTienCanTra = item.soTienCanTra;
      if (item.tienMoiKy !== undefined) opt.dataset.tienMoiKy = item.tienMoiKy;
      sel.appendChild(opt);
    });
  }

  function extractId(val, isMulti) {
    if (!val) return '';
    if (isMulti && val.indexOf(',') !== -1) {
      return val.split(',').map(function(item) {
        return extractIdSingle(item.trim());
      }).filter(Boolean).join(', ');
    }
    return extractIdSingle(val);
  }

  function extractImei(val) {
    if (!val) return '';
    let match = val.match(/IMEI:\s*([^\s\|)]+)/i);
    return match ? match[1].trim() : '';
  }

  function extractIdSingle(val) {
    if (!val) return '';
    let parts = val.split(' - ');
    let prefix = parts[0].trim();
    if (prefix.indexOf('Kỳ') === 0) {
      return prefix.replace('Kỳ', '').trim();
    }
    return prefix;
  }

  function setupMultiSelectDatalist(inputId, listId) {
    let originalInput = document.getElementById(inputId);
    if (!originalInput) return;

    let container = document.createElement('div');
    container.className = 'tag-container';
    
    let tagInput = document.createElement('input');
    tagInput.type = 'text';
    tagInput.className = 'tag-input-field';
    tagInput.placeholder = originalInput.placeholder || 'Gõ để tìm...';
    tagInput.setAttribute('list', listId);

    originalInput.parentNode.insertBefore(container, originalInput);
    container.appendChild(tagInput);
    originalInput.style.display = 'none';

    let tags = [];

    function syncValue() {
      let joinedVal = tags.map(function(t) { return t.text; }).join(', ');
      let descriptor = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value');
      descriptor.set.call(originalInput, joinedVal);
      
      let event = document.createEvent('HTMLEvents');
      event.initEvent('change', true, false);
      originalInput.dispatchEvent(event);
    }

    function addTag(text) {
      text = text.trim();
      if (!text) return;
      
      if (text.indexOf(',') !== -1) {
        let parts = text.split(',');
        parts.forEach(function(p) {
          addTag(p);
        });
        tagInput.value = '';
        return;
      }

      let exists = tags.some(function(t) { return t.text === text; });
      if (exists) {
        tagInput.value = '';
        return;
      }
      
      let tagEl = document.createElement('span');
      tagEl.className = 'tag';
      tagEl.textContent = text;
      
      let closeBtn = document.createElement('span');
      closeBtn.className = 'tag-close';
      closeBtn.innerHTML = '&times;';
      closeBtn.onclick = function(e) {
        e.stopPropagation();
        if (tagEl.parentNode) {
          container.removeChild(tagEl);
        }
        tags = tags.filter(function(t) { return t.element !== tagEl; });
        syncValue();
      };
      
      tagEl.appendChild(closeBtn);
      container.insertBefore(tagEl, tagInput);
      
      tags.push({ text: text, element: tagEl });
      tagInput.value = '';
      syncValue();
    }

    originalInput.clearTags = function() {
      tags.forEach(function(t) {
        if (t.element.parentNode) {
          container.removeChild(t.element);
        }
      });
      tags = [];
      tagInput.value = '';
      let descriptor = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value');
      descriptor.set.call(originalInput, '');
    };

    originalInput.setTagsFromValue = function(val) {
      tags.forEach(function(t) {
        if (t.element.parentNode) {
          container.removeChild(t.element);
        }
      });
      tags = [];
      
      if (val) {
        let parts = val.split(',');
        parts.forEach(function(p) {
          addTag(p.trim());
        });
      }
    };

    let nativeValueDesc = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value');
    Object.defineProperty(originalInput, 'value', {
      get: function() {
        return nativeValueDesc.get.call(originalInput);
      },
      set: function(val) {
        nativeValueDesc.set.call(originalInput, val);
        originalInput.setTagsFromValue(val);
      },
      configurable: true
    });

    tagInput.addEventListener('input', function() {
      let val = tagInput.value;
      let dl = document.getElementById(listId);
      if (!dl) return;
      let opts = dl.querySelectorAll('option');
      for (let i = 0; i < opts.length; i++) {
        if (opts[i].value === val) {
          addTag(val);
          break;
        }
      }
    });

    tagInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        addTag(tagInput.value);
      } else if (e.key === ',') {
        e.preventDefault();
        addTag(tagInput.value);
      } else if (e.key === 'Backspace' && tagInput.value === '') {
        if (tags.length > 0) {
          let lastTag = tags.pop();
          if (lastTag.element.parentNode) {
            container.removeChild(lastTag.element);
          }
          syncValue();
        }
      }
    });

    container.addEventListener('click', function() {
      tagInput.focus();
    });
  }

  function populateDatalist(inputId, listId, items, addEmpty) {
    let dl = document.getElementById(listId);
    if (!dl) return;
    dl.innerHTML = '';

    if (addEmpty) {
      let emptyOpt = document.createElement('option');
      emptyOpt.value = '';
      dl.appendChild(emptyOpt);
    }

    items.forEach(function(item) {
      let opt = document.createElement('option');
      opt.value = item.text || item.value;
      opt.dataset.id = item.value;
      if (item.giaBan !== undefined) opt.dataset.giaBan = item.giaBan;
      if (item.giaTraGop !== undefined) opt.dataset.giaTraGop = item.giaTraGop;
      if (item.soTienCanTra !== undefined) opt.dataset.soTienCanTra = item.soTienCanTra;
      if (item.tienMoiKy !== undefined) opt.dataset.tienMoiKy = item.tienMoiKy;
      dl.appendChild(opt);
    });
  }

  function setupDatalistSearch(inputId, listId, searchFunc) {
    let input = document.getElementById(inputId);
    if (!input) return;

    let debounceTimeout = null;

    input.addEventListener('input', function() {
      let val = input.value.trim();
      let dl = document.getElementById(listId);
      if (!dl) return;

      let isKhachHang = (inputId === 'dh-maKH' || inputId === 'tm-maKH' || inputId === 'bh-maKH' || inputId === 'dv-maKH');
      let isLocal = (inputId === 'dh-maSP' || inputId === 'ck-maSP' || inputId === 'dt-maSP-Nhan' || inputId === 'tm-maSP-Moi' || inputId === 'nk-pkCu-maSP') || (isKhachHang && localCache.khachHang);
      let minLength = isLocal ? 1 : 4;

      if (val.length < minLength) {
        dl.innerHTML = '';
        return;
      }

      if (isLocal) {
        // Skip search if value is an exact match for one of the cached items' text
        let items = [];
        if (inputId === 'dh-maSP') {
          let source = document.getElementById('dh-nguonSP').value;
          items = (source === 'Điện thoại') ? (localCache.dienThoai || []) : (localCache.phuKien || []);
        } else if (inputId === 'ck-maSP' || inputId === 'tm-maSP-Moi') {
          items = localCache.dienThoai || [];
        } else if (inputId === 'dt-maSP-Nhan') {
          let doiTuong = document.getElementById('dt-doiTuong').value;
          if (doiTuong === 'Quà tặng kèm') {
            items = localCache.phuKien || [];
          } else {
            let loaiGD = document.getElementById('dt-loaiGD').value;
            items = (loaiGD === 'Đổi máy') ? (localCache.dienThoai || []) : (localCache.phuKien || []);
          }
        } else if (inputId === 'nk-pkCu-maSP') {
          items = localCache.phuKien || [];
        } else if (isKhachHang) {
          items = localCache.khachHang || [];
        }

        let exactMatch = items.some(function(item) {
          return item.text === val;
        });

        if (exactMatch) {
          dl.innerHTML = '';
          return;
        }
      }

      clearTimeout(debounceTimeout);

      if (isLocal) {
        searchFunc(val, function(items) {
          populateDatalist(inputId, listId, items || []);
        });
      } else {
        dl.innerHTML = '';
        let loadOpt = document.createElement('option');
        loadOpt.value = '\u23F3 \u0110ang t\u00ECm ki\u1EBFm...';
        dl.appendChild(loadOpt);

        debounceTimeout = setTimeout(function() {
          searchFunc(val, function(items) {
            populateDatalist(inputId, listId, items || []);
          });
        }, 500);
      }
    });
  }

  // ==================== EVENT HANDLERS ====================

  function onDonHangBranchOrNguonChange() {
    let branch = document.getElementById('dh-chiNhanh').value;
    let source = document.getElementById('dh-nguonSP').value;
    let spInput = document.getElementById('dh-maSP');
    let quaInput = document.getElementById('dh-maQuaTang');
    let spList = document.getElementById('dh-maSP-list');
    let quaList = document.getElementById('dh-maQuaTang-list');

    let htbSelect = document.getElementById('dh-hinhThucBan');
    let accContainer = document.getElementById('dh-accessories-container');
    let stdQtyPriceRow = document.getElementById('dh-standard-qty-price-row');
    let giftRow = document.getElementById('dh-coNhanQua') ? document.getElementById('dh-coNhanQua').parentNode.parentNode : null;

    if (source === 'Điện thoại') {
      if (accContainer) accContainer.style.display = 'none';
      if (stdQtyPriceRow) stdQtyPriceRow.style.display = 'flex';
      if (giftRow) giftRow.style.display = 'flex';
      let accList = document.getElementById('dh-accessories-list');
      if (accList) accList.innerHTML = '';

      document.getElementById('dh-soLuong').value = 1;
      document.getElementById('dh-soLuong').disabled = true;
      if (htbSelect.options.length < 2) {
        let opt = document.createElement('option');
        opt.value = 'Trả góp';
        opt.textContent = 'Trả góp';
        htbSelect.appendChild(opt);
      }
    } else {
      if (accContainer) accContainer.style.display = 'block';
      if (stdQtyPriceRow) stdQtyPriceRow.style.display = 'none';
      if (giftRow) giftRow.style.display = 'none';
      
      let coNhan = document.getElementById('dh-coNhanQua');
      if (coNhan) {
        coNhan.value = '✗';
        onCoNhanQuaChange();
      }

      document.getElementById('dh-soLuong').disabled = false;
      htbSelect.value = 'Bán thẳng';
      if (htbSelect.options.length >= 2) {
        htbSelect.remove(1);
      }
      onHinhThucBanChange();
    }

    spInput.value = '';
    quaInput.value = '';

    if (!branch) {
      spInput.placeholder = 'Chọn chi nhánh trước';
      quaInput.placeholder = 'Chọn chi nhánh trước';
      if (spList) spList.innerHTML = '';
      if (quaList) quaList.innerHTML = '';
      return;
    }

    spInput.placeholder = 'Gõ để tìm kiếm...';
    if (spList) spList.innerHTML = '';

  function onSanPhamChange() {
    let val = document.getElementById('dh-maSP').value.trim();
    if (!val) return;

    let branch = document.getElementById('dh-chiNhanh').value;
    let source = document.getElementById('dh-nguonSP').value;

    let matchedItem = null;
    if (source === 'Phụ kiện') {
      let items = localCache.phuKien || [];
      for (let i = 0; i < items.length; i++) {
        if (items[i].text === val || items[i].value === val) {
          matchedItem = items[i];
          break;
        }
      }
      if (matchedItem) {
        let id = matchedItem.value;
        let price = Number(matchedItem.giaBan) || 0;
        addAccessoryRow(id, val, price);
        document.getElementById('dh-maSP').value = ''; // Xoá ô nhập liệu để tìm phụ kiện tiếp theo
        let dl = document.getElementById('dh-maSP-list');
        if (dl) dl.innerHTML = '';
      }
    } else {
      let items = localCache.dienThoai || [];
      for (let i = 0; i < items.length; i++) {
        if (items[i].text === val || items[i].value === val) {
          matchedItem = items[i];
          break;
        }
      }
      if (matchedItem) {
        let price = Number(matchedItem.giaBan) || 0;
        let hinhThuc = document.getElementById('dh-hinhThucBan').value;
        if (hinhThuc === 'Trả góp' && matchedItem.giaTraGop) {
          document.getElementById('dh-donGia').value = matchedItem.giaTraGop;
        } else {
          document.getElementById('dh-donGia').value = price;
        }
        tinhThanhTien();
        let dl = document.getElementById('dh-maSP-list');
        if (dl) dl.innerHTML = '';
      }
    }
  }

  function addAccessoryRow(id, name, price) {
    let existingRow = document.querySelector('#dh-accessories-list tr[data-id="' + id + '"]');
    if (existingRow) {
      let qtyInput = existingRow.querySelector('.acc-qty');
      qtyInput.value = parseInt(qtyInput.value) + 1;
      tinhThanhTienAccRow(existingRow);
      return;
    }

    let tbody = document.getElementById('dh-accessories-list');
    let tr = document.createElement('tr');
    tr.setAttribute('data-id', id);
    tr.style.borderBottom = '1px solid #dadce0';

    tr.innerHTML = 
      '<td style="padding: 6px 8px; text-align: left; vertical-align: middle;">' + escapeHtml(name) + '</td>' +
      '<td style="padding: 6px 8px; text-align: center; vertical-align: middle;"><input type="number" value="1" min="1" class="acc-qty" style="width: 50px; text-align: center; padding: 4px;" onchange="tinhThanhTienAccRow(this.parentNode.parentNode)"></td>' +
      '<td style="padding: 6px 8px; text-align: right; vertical-align: middle;"><input type="number" value="' + price + '" class="acc-price" style="width: 80px; text-align: right; padding: 4px;" onchange="tinhThanhTienAccRow(this.parentNode.parentNode)"></td>' +
      '<td style="padding: 6px 8px; text-align: right; vertical-align: middle;" class="acc-total">' + formatNumber(price) + ' đ</td>' +
      '<td style="padding: 6px 8px; text-align: center; vertical-align: middle;"><button type="button" class="btn btn-danger" style="padding: 2px 6px; border: none; border-radius: 4px; cursor: pointer; width: auto; margin: 0; font-size: 11px;" onclick="removeAccessoryRow(this)">X</button></td>';

    tbody.appendChild(tr);
    tinhTongTienAcc();
  }

  function tinhThanhTienAccRow(row) {
    let qty = parseInt(row.querySelector('.acc-qty').value) || 0;
    let price = parseFloat(row.querySelector('.acc-price').value) || 0;
    let total = qty * price;
    row.querySelector('.acc-total').textContent = formatNumber(total) + ' đ';
    tinhTongTienAcc();
  }

  function removeAccessoryRow(btn) {
    let row = btn.parentNode.parentNode;
    row.parentNode.removeChild(row);
    tinhTongTienAcc();
  }

  function tinhTongTienAcc() {
    let rows = document.querySelectorAll('#dh-accessories-list tr');
    let grandTotal = 0;
    rows.forEach(function(row) {
      let qty = parseInt(row.querySelector('.acc-qty').value) || 0;
      let price = parseFloat(row.querySelector('.acc-price').value) || 0;
      grandTotal += (qty * price);
    });

    let summary = document.getElementById('dh-summary');
    let giamGia = Number(document.getElementById('dh-tienGiamGia').value) || 0;
    let thanhTien = grandTotal - giamGia;

    summary.style.display = 'block';
    summary.innerHTML = '<div class="summary-row summary-total"><span>Thành tiền:</span><span>' +
      formatNumber(thanhTien) + ' đ</span></div>';
    updateSplitPaymentAmounts('dh');
  }

  function tinhDoiTraChenhLech() {
    let loai = document.getElementById('dt-loaiGD').value;
    let phi = Number(document.getElementById('dt-phiDoiTra').value) || 0;
    let label = document.getElementById('dt-tienLabel');
    let valInput = document.getElementById('dt-tienHoanTra');

    if (!originalOrderData) {
      valInput.value = 0;
      return;
    }

    if (loai === 'Trả máy' || loai === 'Trả hàng') {
      let hoanTien = originalOrderPrice - phi;
      label.textContent = 'Tiền hoàn trả';
      valInput.value = hoanTien;
    } else if (loai === 'Đổi quà') {
      label.textContent = 'Tiền thanh toán (Phí)';
      valInput.value = phi;
    } else {
      let val = document.getElementById('dt-maSP-Nhan').value.trim();
      let doiTuong = document.getElementById('dt-doiTuong').value;
      
      let items = [];
      if (doiTuong === 'Quà tặng kèm') {
        items = localCache.phuKien || [];
      } else {
        let loaiGD = document.getElementById('dt-loaiGD').value;
        items = (loaiGD === 'Đổi máy') ? (localCache.dienThoai || []) : (localCache.phuKien || []);
      }
      
      let giaMoi = 0;
      for (let i = 0; i < items.length; i++) {
        if (items[i].text === val || items[i].value === val) {
          giaMoi = Number(items[i].giaBan) || 0;
          break;
        }
      }

      let diff = originalOrderPrice - giaMoi - phi;
      if (diff >= 0) {
        label.textContent = 'Tiền cửa hàng trả lại khách (VND)';
        valInput.value = diff;
      } else {
        label.textContent = 'Tiền khách cần đóng thêm (VND)';
        valInput.value = Math.abs(diff);
      }
    }
    updateSplitPaymentAmounts('dt');
  }

    let items = localCache.dienThoai || [];
    for (let i = 0; i < items.length; i++) {
      if (items[i].text === val || items[i].value === val) {
        matchedItem = items[i];
        break;
      }
    }
    if (matchedItem) {
      let price = Number(matchedItem.giaBan) || 0;
      document.getElementById('tm-donGia-Moi').value = price;
      tinhThuMuaChenhLech();
      let dl = document.getElementById('tm-maSP-Moi-list');
      if (dl) dl.innerHTML = '';
    }
  }

  function tinhThuMuaTraGop(customChenhLech) {
    let giaMoi = getThuMuaGiaMayMoi();
    let hoTro = Number(document.getElementById('tm-tienHoTro').value) || 0;
    let giamGia = Number(document.getElementById('tm-tienGiamGia').value) || 0;
    let giaMayMoi = giaMoi - giamGia - hoTro;

    // Tiền thu cũ khấu trừ trực tiếp vào đơn mới (truAmt)
    let truAmt = Number(document.getElementById('tm-truDonMoiAmt').value) || 0;
    let thucCanThanhToan = Math.max(0, giaMayMoi - truAmt);

    let loai = document.getElementById('tm-tg-loai').value;
    let isCTTC = (loai === 'Công ty tài chính');

    document.getElementById('tm-tg-congTyTCGroup').style.display = isCTTC ? 'block' : 'none';

    let httt = document.getElementById('tm-Moi-hinhThucTT') ? document.getElementById('tm-Moi-hinhThucTT').value : '';
    let traTruoc = 0;
    if (httt === 'Hỗn hợp') {
      let tm = Number(document.getElementById('tm-Moi-split-tienMat').value) || 0;
      let ck = Number(document.getElementById('tm-Moi-split-chuyenKhoan').value) || 0;
      traTruoc = tm + ck;
    } else {
      traTruoc = Number(document.getElementById('tm-tg-traTruoc').value) || 0;
    }

    let soKy = Number(document.getElementById('tm-tg-soKy').value) || 1;
    let conLai = thucCanThanhToan - traTruoc;

    if (conLai <= 0) {
      document.getElementById('tm-tg-summary').style.display = 'none';
      showAlertMsg('error', 'Số tiền trả trước phải nhỏ hơn số tiền thực cần thanh toán để mua trả góp!');
      return;
    }

    let activeId = document.activeElement ? document.activeElement.id : '';
    let tienMoiKyInput = document.getElementById('tm-tg-tienMoiKyInput');
    let tienMoiKy = Number(tienMoiKyInput.value) || 0;

    if (activeId !== 'tm-tg-tienMoiKyInput') {
      tienMoiKy = Math.ceil(conLai / soKy);
      tienMoiKyInput.value = tienMoiKy;
    }

    let summary = document.getElementById('tm-tg-summary');
    summary.style.display = 'block';

    let html =
      '<div class="summary-row"><span>Giá máy mới:</span><span>' + formatNumber(giaMayMoi) + ' đ</span></div>';

    if (truAmt > 0) {
      html +=
        '<div class="summary-row" style="color:#b06000;"><span>Trừ tiền thu mua:</span><span>-' + formatNumber(truAmt) + ' đ</span></div>' +
        '<div class="summary-row" style="font-weight:bold;"><span>Thực cần thanh toán:</span><span>' + formatNumber(thucCanThanhToan) + ' đ</span></div>';
    }

    html +=
      '<div class="summary-row"><span>Trả trước:</span><span>' + formatNumber(traTruoc) + ' đ</span></div>' +
      '<div class="summary-row"><span>Còn lại cần góp:</span><span>' + formatNumber(conLai) + ' đ</span></div>' +
      '<div class="summary-row"><span>Số kỳ:</span><span>' + soKy + ' kỳ</span></div>' +
      '<div class="summary-row summary-total"><span>Mỗi kỳ (thực đóng):</span><span>' + formatNumber(tienMoiKy) + ' đ</span></div>';

    summary.innerHTML = html;
    updateSplitPaymentAmounts('tm');
  }

  function tinhThuMuaChenhLech() {
    let loai = document.getElementById('tm-loaiGD').value;
    let giaThu = Number(document.getElementById('tm-giaThuMua').value) || 0;
    let hoTro = Number(document.getElementById('tm-tienHoTro').value) || 0;
    let maxTru = giaThu + hoTro;
    let summary = document.getElementById('tm-summary');

    if (loai === 'Bán thẳng') {
      summary.innerHTML = '';
      return;
    }

    let truAmtInput = document.getElementById('tm-truDonMoiAmt');
    let truAmt = Number(truAmtInput.value) || 0;
    if (truAmt < 0) truAmt = 0;
    if (truAmt > maxTru) truAmt = maxTru;
    truAmtInput.value = truAmt;

    let giaMoi = getThuMuaGiaMayMoi();
    let giamGia = Number(document.getElementById('tm-tienGiamGia').value) || 0;
    let valueMoiSauGiam = giaMoi - giamGia;
    
    // Số tiền khách cần thanh toán thêm cho máy mới
    let chenhLech = valueMoiSauGiam - truAmt;

    // Số tiền cửa hàng thanh toán thực tế cho khách qua Thu mua
    let traKhachConLai = maxTru - truAmt;

    let html = '<strong>Giá bán máy mới:</strong> ' + formatNumber(giaMoi) + ' đ<br>';
    if (giamGia > 0) {
      html += '<strong>Giảm giá máy mới:</strong> -' + formatNumber(giamGia) + ' đ<br>';
      html += '<strong>Giá sau giảm:</strong> ' + formatNumber(valueMoiSauGiam) + ' đ<br>';
    }
    html += '<strong>Tổng giá trị thu máy cũ:</strong> ' + formatNumber(maxTru) + ' đ (Hỗ trợ: ' + formatNumber(hoTro) + ' đ)<br>';
    html += '<strong>Trừ vào đơn mới:</strong> -' + formatNumber(truAmt) + ' đ<br>';

    if (traKhachConLai > 0) {
      let htttThu = document.getElementById('tm-Thu-hinhThucTT').value;
      html += '<strong style="color: #b06000;">Trả lại khách (tiền thừa thu máy) qua ' + htttThu + ': ' + formatNumber(traKhachConLai) + ' đ</strong><br>';
    }

    if (chenhLech >= 0) {
      html += '<strong style="color: #1a73e8;">Khách cần thanh toán thêm cho máy mới: ' + formatNumber(chenhLech) + ' đ</strong>';
    } else {
      html += '<strong style="color: #137333;">Cửa hàng trả lại khách chênh lệch máy: ' + formatNumber(Math.abs(chenhLech)) + ' đ</strong>';
    }

    summary.innerHTML = html;

    // Cập nhật tính toán trả góp nếu hình thức bán là Trả góp
    let htb = document.getElementById('tm-hinhThucBan').value;
    if (htb === 'Trả góp') {
      tinhThuMuaTraGop();
    }
    updateSplitPaymentAmounts('tm');
  }

  function tinhThanhTien() {
    let source = document.getElementById('dh-nguonSP').value;
    if (source === 'Phụ kiện') {
      tinhTongTienAcc();
      return;
    }

    let soLuong = Number(document.getElementById('dh-soLuong').value) || 0;
    let donGia = Number(document.getElementById('dh-donGia').value) || 0;
    let giamGia = Number(document.getElementById('dh-tienGiamGia').value) || 0;
    let thanhTien = (soLuong * donGia) - giamGia;

    let summary = document.getElementById('dh-summary');
    summary.style.display = 'block';
    summary.innerHTML = '<div class="summary-row summary-total"><span>Thành tiền:</span><span>' +
      formatNumber(thanhTien) + ' đ</span></div>';

    if (document.getElementById('dh-hinhThucBan').value === 'Trả góp') {
      tinhTraGop();
    }
    updateSplitPaymentAmounts('dh');
  }

  function tinhTraGop() {
    let thanhTien = getDonHangThanhTien();
    
    let traTruoc = 0;
    let httt = document.getElementById('dh-hinhThucTT') ? document.getElementById('dh-hinhThucTT').value : '';
    if (httt === 'Hỗn hợp') {
      let tm = Number(document.getElementById('dh-split-tienMat').value) || 0;
      let ck = Number(document.getElementById('dh-split-chuyenKhoan').value) || 0;
      traTruoc = tm + ck;
    } else {
      traTruoc = Number(document.getElementById('tg-traTruoc').value) || 0;
    }

    let soKy = Number(document.getElementById('tg-soKy').value) || 1;
    let conLai = thanhTien - traTruoc;

    if (conLai <= 0) {
      document.getElementById('tg-summary').style.display = 'none';
      showAlertMsg('error', 'Số tiền trả trước phải nhỏ hơn tổng tiền đơn hàng để mua trả góp!');
      return;
    }

    let loai = document.getElementById('tg-loai').value;
    let isCTTC = (loai === 'Công ty tài chính');

    document.getElementById('tg-congTyTCGroup').style.display = isCTTC ? 'block' : 'none';

    let activeId = document.activeElement ? document.activeElement.id : '';
    let tienMoiKyInput = document.getElementById('tg-tienMoiKyInput');
    let tienMoiKy = Number(tienMoiKyInput.value) || 0;

    if (activeId !== 'tg-tienMoiKyInput') {
      tienMoiKy = Math.ceil(conLai / soKy);
      tienMoiKyInput.value = tienMoiKy;
    }

    let summary = document.getElementById('tg-summary');
    summary.style.display = 'block';

    let html =
      '<div class="summary-row"><span>Tổng tiền:</span><span>' + formatNumber(thanhTien) + ' đ</span></div>' +
      '<div class="summary-row"><span>Trả trước:</span><span>' + formatNumber(traTruoc) + ' đ</span></div>' +
      '<div class="summary-row"><span>Còn lại (Tiền vay):</span><span>' + formatNumber(conLai) + ' đ</span></div>' +
      '<div class="summary-row"><span>Số kỳ:</span><span>' + soKy + ' kỳ</span></div>' +
      '<div class="summary-row summary-total"><span>Mỗi kỳ (thực đóng):</span><span>' + formatNumber(tienMoiKy) + ' đ</span></div>';

    summary.innerHTML = html;
    updateSplitPaymentAmounts('dh');
  }

  function submitDonHang() {
    let chiNhanh = document.getElementById('dh-chiNhanh').value;
    let maKH = extractId(document.getElementById('dh-maKH').value);
    let nguonSP = document.getElementById('dh-nguonSP').value;
    let nguoiBan = extractId(document.getElementById('dh-nguoiBan').value);

    if (!chiNhanh || !maKH || !nguoiBan) {
      showAlertMsg('error', 'Vui lòng chọn Chi nhánh, Khách hàng và Người bán!');
      return;
    }

    let data = {
      chiNhanh: chiNhanh,
      maKH: maKH,
      tenKH: extractCustomerName(document.getElementById('dh-maKH').value),
      nguonSP: nguonSP,
      tienGiamGia: Number(document.getElementById('dh-tienGiamGia').value) || 0,
      hinhThucBan: document.getElementById('dh-hinhThucBan').value,
      hinhThucThanhToan: getPaymentMethodString('dh'),
      nguoiBan: nguoiBan,
      nguoiHoTro: extractId(document.getElementById('dh-nguoiHoTro').value),
      ghiChu: document.getElementById('dh-ghiChu').value
    };

    if (document.getElementById('dh-hinhThucTT').value === 'Hỗn hợp') {
      data.splitTienMat = Number(document.getElementById('dh-split-tienMat').value) || 0;
      data.splitChuyenKhoan = Number(document.getElementById('dh-split-chuyenKhoan').value) || 0;
    }

    if (nguonSP === 'Phụ kiện') {
      let rows = document.querySelectorAll('#dh-accessories-list tr');
      if (rows.length === 0) {
        showAlertMsg('error', 'Vui lòng chọn ít nhất một phụ kiện để tạo đơn!');
        return;
      }
      data.items = [];
      for (let i = 0; i < rows.length; i++) {
        let row = rows[i];
        let id = row.getAttribute('data-id');
        let qty = parseInt(row.querySelector('.acc-qty').value) || 1;
        let price = parseFloat(row.querySelector('.acc-price').value) || 0;
        data.items.push({
          maSP: id,
          soLuong: qty,
          donGia: price
        });
      }
    } else {
      let maSP = extractId(document.getElementById('dh-maSP').value);
      let imei = extractImei(document.getElementById('dh-maSP').value);

      if (!maSP) {
        showAlertMsg('error', 'Vui lòng chọn Sản phẩm cần bán!');
        return;
      }

      data.maSP = maSP;
      data.imei = imei;
      data.soLuong = Number(document.getElementById('dh-soLuong').value) || 1;
      data.donGia = Number(document.getElementById('dh-donGia').value) || 0;
      data.coNhanQua = document.getElementById('dh-coNhanQua').value;
      data.maQuaTang = extractId(document.getElementById('dh-maQuaTang').value, true);

      if (data.hinhThucBan === 'Trả góp') {
        data.traGop = {
          traTruoc: (document.getElementById('dh-hinhThucTT').value === 'Hỗn hợp')
            ? (Number(document.getElementById('dh-split-chuyenKhoan').value) + Number(document.getElementById('dh-split-tienMat').value))
            : (Number(document.getElementById('tg-traTruoc').value) || 0),
          soKy: Number(document.getElementById('tg-soKy').value) || 6,
          loaiTraGop: document.getElementById('tg-loai').value,
          congTyTC: document.getElementById('tg-congTyTC').value,
          tienMoiKy: Number(document.getElementById('tg-tienMoiKyInput').value) || 0
        };
      }
    }

    if (data.hinhThucBan === 'Trả góp' && data.traGop) {
      let traTruocVal = 0;
      if (document.getElementById('dh-hinhThucTT').value === 'Hỗn hợp') {
        let tm = Number(document.getElementById('dh-split-tienMat').value) || 0;
        let ck = Number(document.getElementById('dh-split-chuyenKhoan').value) || 0;
        traTruocVal = tm + ck;
      } else {
        traTruocVal = Number(document.getElementById('tg-traTruoc').value) || 0;
      }
      let totalVal = getDonHangThanhTien();
      if (traTruocVal >= totalVal) {
        showAlertMsg('error', 'Số tiền trả trước phải nhỏ hơn tổng tiền đơn hàng để mua trả góp!');
        return;
      }
    }

    setLoading('btnTaoDonHang', true);
    google.script.run
      .withSuccessHandler(function(maDH) {
        setLoading('btnTaoDonHang', false);
        showAlertMsg('success', 'Đã tạo đơn hàng: <strong>' + escapeHtml(maDH) + '</strong>');
        resetFormDonHang();
        preloadInventoryData(onDonHangBranchOrNguonChange);
      })
      .withFailureHandler(function(err) {
        setLoading('btnTaoDonHang', false);
        showAlertMsg('error', 'Lỗi: ' + err.message);
      })
      .taoDonHang(data);
  }

  function submitDoiTra() {
    let maDH = document.getElementById('dt-maDH').value.trim();
    let doiTuong = document.getElementById('dt-doiTuong').value;
    let loaiGD = document.getElementById('dt-loaiGD').value;
    let chiNhanh = document.getElementById('dt-chiNhanh').value;
    let maSP_Nhan = extractId(document.getElementById('dt-maSP-Nhan').value);
    let phiDoiTra = Number(document.getElementById('dt-phiDoiTra').value) || 0;
    let tienHoanTra = Number(document.getElementById('dt-tienHoanTra').value) || 0;
    let hinhThucTT = getPaymentMethodString('dt');
    let nguoiTH = extractId(document.getElementById('dt-nguoiThucHien').value);
    let ghiChu = document.getElementById('dt-ghiChu').value.trim();

    if (!maDH || !loaiGD || !chiNhanh || !nguoiTH) {
      showAlertMsg('error', 'Vui lòng nhập Mã đơn hàng, Loại giao dịch, Chi nhánh và Người thực hiện!');
      return;
    }

    let giftExchanges = [];
    if (doiTuong === 'Quà tặng kèm' && loaiGD === 'Đổi quà') {
      let checks = document.querySelectorAll('.dt-gift-check');
      for (let i = 0; i < checks.length; i++) {
        if (checks[i].checked) {
          let oldCode = checks[i].value;
          let oldName = checks[i].getAttribute('data-name');
          let newValRaw = document.getElementById('dt-gift-new-' + oldCode).value.trim();
          let newCode = extractId(newValRaw);
          if (!newCode) {
            showAlertMsg('error', 'Vui lòng chọn quà tặng mới thay thế cho quà ' + oldCode + '!');
            return;
          }
          giftExchanges.push({
            oldCode: oldCode,
            oldName: oldName,
            newCode: newCode,
            newValRaw: newValRaw
          });
        }
      }
      if (giftExchanges.length === 0) {
        showAlertMsg('error', 'Vui lòng chọn ít nhất 1 quà tặng kèm cần đổi!');
        return;
      }
    } else {
      if ((loaiGD === 'Đổi máy' || loaiGD === 'Đổi hàng') && !maSP_Nhan) {
        showAlertMsg('error', 'Vui lòng chọn sản phẩm mới để đổi!');
        return;
      }
    }

    let imei_Nhan = extractImei(document.getElementById('dt-maSP-Nhan').value);

    setLoading('btnDoiTra', true);
    let data = {
      maDH: maDH,
      doiTuong: doiTuong,
      loaiGiaoDich: loaiGD,
      chiNhanh: chiNhanh,
      maSP_Nhan: maSP_Nhan,
      imei_Nhan: imei_Nhan,
      phiDoiTra: phiDoiTra,
      tienHoanTra: tienHoanTra,
      hinhThucThanhToan: hinhThucTT,
      nguoiThucHien: nguoiTH,
      ghiChu: ghiChu,
      congKho: document.getElementById('dt-congKho').checked,
      giftExchanges: giftExchanges
    };

    google.script.run
      .withSuccessHandler(function(maDT) {
        setLoading('btnDoiTra', false);
        showAlertMsg('success', 'Ghi nhận thành công! Mã giao dịch: <strong>' + escapeHtml(maDT) + '</strong>');
        document.getElementById('dt-maDH').value = '';
        document.getElementById('dt-infoBox').style.display = 'none';
        document.getElementById('dt-doiTuongGroup').style.display = 'none';
        document.getElementById('dt-phiDoiTra').value = 0;
        document.getElementById('dt-tienHoanTra').value = 0;
        document.getElementById('dt-ghiChu').value = '';
        document.getElementById('dt-maSP-Nhan').value = '';
        document.getElementById('dt-nguoiThucHien').value = '';
        originalOrderData = null;
        preloadInventoryData();
      })
      .withFailureHandler(function(err) {
        setLoading('btnDoiTra', false);
        showAlertMsg('error', 'Lỗi: ' + err.message);
      })
      .thucHienDoiTra(data);
  }

  function submitThuMua() {
    let maKH = extractId(document.getElementById('tm-maKH').value);
    let loaiGD = document.getElementById('tm-loaiGD').value;
    let tenSP = document.getElementById('tm-tenSP-Thu').value.trim();
    let imei = document.getElementById('tm-imei-Thu').value.trim();
    let chiNhanh = document.getElementById('tm-chiNhanh').value;
    let nguoiTH = extractId(document.getElementById('tm-nguoiThucHien').value);
    let nguoiHT = extractId(document.getElementById('tm-nguoiHoTro').value);

    if (!maKH || !tenSP || !imei || !chiNhanh || !nguoiTH) {
      showAlertMsg('error', 'Vui lòng chọn Khách hàng, nhập Tên SP, IMEI, Chi nhánh và Người thực hiện!');
      return;
    }

    let htb = (loaiGD === 'Thu cũ đổi mới') ? document.getElementById('tm-hinhThucBan').value : 'Bán thẳng';
    let htttThu = getPaymentMethodString('tm-Thu');

    let data = {
      maKH: maKH,
      tenKH: extractCustomerName(document.getElementById('tm-maKH').value),
      loaiGiaoDich: loaiGD,
      tenSP_Thu: tenSP,
      thuongHieu_Thu: document.getElementById('tm-thuongHieu-Thu').value,
      imei_Thu: imei,
      mauSac_Thu: document.getElementById('tm-mauSac-Thu').value.trim(),
      dungLuong_Thu: document.getElementById('tm-dungLuong-Thu').value.trim(),
      tinhTrang_Thu: document.getElementById('tm-tinhTrang-Thu').value,
      giaThuMua: Number(document.getElementById('tm-giaThuMua').value) || 0,
      chiNhanh: chiNhanh,
      nguoiThucHien: nguoiTH,
      nguoiHoTro: nguoiHT,
      hinhThucThanhToan: htttThu,
      ghiChu: document.getElementById('tm-ghiChu').value.trim()
    };

    if (htttThu === 'Hỗn hợp') {
      data.splitTienMat = Number(document.getElementById('tm-Thu-split-tienMat').value) || 0;
      data.splitChuyenKhoan = Number(document.getElementById('tm-Thu-split-chuyenKhoan').value) || 0;
    } else if (htttThu === 'Trừ vào đơn mới' && loaiGD !== 'Thu cũ đổi mới') {
      // "Trừ vào đơn mới" chỉ hợp lệ khi Thu cũ đổi mới
      showAlertMsg('error', 'Hình thức "Trừ vào đơn mới" chỉ áp dụng cho giao dịch Thu cũ đổi mới!');
      return;
    }

    if (loaiGD === 'Thu cũ đổi mới') {
      let htttMoi = getPaymentMethodString('tm-Moi');
      data.maSP_Moi = extractId(document.getElementById('tm-maSP-Moi').value);
      data.imei_Moi = extractImei(document.getElementById('tm-maSP-Moi').value);
      data.donGia_Moi = Number(document.getElementById('tm-donGia-Moi').value) || 0;
      data.tienHoTro = Number(document.getElementById('tm-tienHoTro').value) || 0;
      data.coNhanQua = document.getElementById('tm-coNhanQua').value;
      data.maQuaTang = extractId(document.getElementById('tm-maQuaTang').value, true);
      data.tienGiamGia = Number(document.getElementById('tm-tienGiamGia').value) || 0;
      data.hinhThucBan = htb;
      data.hinhThucThanhToanPhu = htttMoi;
      data.tradeInDeduction = Number(document.getElementById('tm-truDonMoiAmt').value) || 0;

      if (htttMoi === 'Hỗn hợp') {
        data.splitTienMatPhu = Number(document.getElementById('tm-Moi-split-tienMat').value) || 0;
        data.splitChuyenKhoanPhu = Number(document.getElementById('tm-Moi-split-chuyenKhoan').value) || 0;
      }

      if (!data.maSP_Moi) {
        showAlertMsg('error', 'Vui lòng chọn điện thoại mới để đổi lên đời!');
        return;
      }

      if (htb === 'Trả góp') {
        let tmHttt = document.getElementById('tm-Moi-hinhThucTT').value;
        let derivedTraTruoc = 0;
        if (tmHttt === 'Hỗn hợp') {
          let tm = Number(document.getElementById('tm-Moi-split-tienMat').value) || 0;
          let ck = Number(document.getElementById('tm-Moi-split-chuyenKhoan').value) || 0;
          derivedTraTruoc = tm + ck;
        } else {
          derivedTraTruoc = Number(document.getElementById('tm-tg-traTruoc').value) || 0;
        }

        data.traGop = {
          traTruoc: derivedTraTruoc,
          soKy: Number(document.getElementById('tm-tg-soKy').value) || 6,
          loaiTraGop: document.getElementById('tm-tg-loai').value,
          congTyTC: document.getElementById('tm-tg-congTyTC').value,
          tienMoiKy: Number(document.getElementById('tm-tg-tienMoiKyInput').value) || 0
        };
        if (data.traGop.loaiTraGop === 'Công ty tài chính' && !data.traGop.congTyTC) {
          showAlertMsg('error', 'Vui lòng chọn Công ty tài chính cho hợp đồng trả góp!');
          return;
        }

        let giaMoi = getThuMuaGiaMayMoi();
        let giaMayMoi = giaMoi - data.tienGiamGia - data.tienHoTro;

        // Giảm số tiền cần trả góp bằng giá trị máy cũ khấu trừ vào đơn mới (data.tradeInDeduction)
        if (data.tradeInDeduction > 0) {
          giaMayMoi = Math.max(0, giaMayMoi - data.tradeInDeduction);
        }

        if (derivedTraTruoc >= giaMayMoi) {
          showAlertMsg('error', 'Số tiền trả trước phải nhỏ hơn số tiền thực cần thanh toán để mua trả góp!');
          return;
        }
      }
    }

    setLoading('btnThuMua', true);
    google.script.run
      .withSuccessHandler(function(maTM) {
        setLoading('btnThuMua', false);
        showAlertMsg('success', 'Ghi nhận thu mua thành công! Ma: <strong>' + escapeHtml(maTM) + '</strong>');
        document.getElementById('tm-tenSP-Thu').value = '';
        document.getElementById('tm-imei-Thu').value = '';
        document.getElementById('tm-mauSac-Thu').value = '';
        document.getElementById('tm-dungLuong-Thu').value = '';
        document.getElementById('tm-giaThuMua').value = 0;
        document.getElementById('tm-maSP-Moi').value = '';
        document.getElementById('tm-donGia-Moi').value = 0;
        document.getElementById('tm-tienHoTro').value = 0;
        document.getElementById('tm-coNhanQua').value = '✗';
        document.getElementById('tm-maQuaTang').value = '';
        document.getElementById('tm-tienGiamGia').value = 0;
        document.getElementById('tm-maQuaTangGroup').style.display = 'none';
        document.getElementById('tm-ghiChu').value = '';
        document.getElementById('tm-nguoiHoTro').value = '';
        document.getElementById('tm-tradeInFields').style.display = 'none';
        document.getElementById('tm-hinhThucBanGroup').style.display = 'none';
        document.getElementById('tm-hinhThucBan').value = 'Bán thẳng';

        // reset installment inputs
        document.getElementById('tm-tg-traTruoc').value = 0;
        document.getElementById('tm-tg-soKy').value = 6;
        document.getElementById('tm-tg-loai').value = 'Cửa hàng';
        document.getElementById('tm-tg-congTyTC').value = '';
        document.getElementById('tm-tg-tienMoiKyInput').value = 0;
        document.getElementById('tm-tg-summary').style.display = 'none';
        document.getElementById('tm-traGopSection').classList.remove('show');

        let htttThu = document.getElementById('tm-Thu-hinhThucTT');
        if (htttThu) {
          htttThu.value = 'Tiền mặt';
          onPaymentMethodChange('tm-Thu');
        }
        let htttMoi = document.getElementById('tm-Moi-hinhThucTT');
        if (htttMoi) {
          htttMoi.value = 'Tiền mặt';
          onPaymentMethodChange('tm-Moi');
        }

        if (document.getElementById('tm-maQuaTang').clearTags) {
          document.getElementById('tm-maQuaTang').clearTags();
        }
        preloadInventoryData();
      })
      .withFailureHandler(function(err) {
        setLoading('btnThuMua', false);
        showAlertMsg('error', 'Lỗi: ' + err.message);
      })
      .thucHienThuMua(data);
  }

    if (isNaN(thang) || isNaN(nam)) {
      showAlertMsg('error', 'Vui lòng chọn Tháng và Năm hợp lệ!');

    }

    setLoading('btnXemDS', true);

    google.script.run

  function renderBaoCaoDoanhSo(result) {
    if (!result || !result.nhanVien || result.nhanVien.length === 0) {
      showAlertMsg('error', 'Không có dữ liệu doanh số cho tháng này. Vui lòng bấm "Chốt doanh số" trước!');
      return;
    }

    // Render summary cards
    document.getElementById('ds-tongMay').innerText = result.tongSoMayBan;
    document.getElementById('ds-tongHH').innerText = formatNumber(result.tongHoaHong) + 'đ';
    document.getElementById('ds-tongDV').innerText = formatNumber(result.tongDoanhThuDV) + 'đ';
    document.getElementById('ds-tongThuNhap').innerText = formatNumber(result.tongThuNhap) + 'đ';
    document.getElementById('ds-summaryArea').style.display = 'block';

    // Render table
    let tbody = document.getElementById('ds-tableBody');
    tbody.innerHTML = '';

    result.nhanVien.forEach(function(nv) {
      let tr = document.createElement('tr');
      
      // Role badge class
      let roleClass = '';
      if (nv.vaiTro === 'Bán hàng') roleClass = 'role-banhang';
      else if (nv.vaiTro === 'Kế toán') roleClass = 'role-ketoan';
      else if (nv.vaiTro === 'Kỹ thuật') roleClass = 'role-kythuat';

      let html = '';
      html += '<td><strong>' + escapeHtml(nv.tenNV) + '</strong><br><span style="color:#5f6368;font-size:9px;">' + escapeHtml(nv.maNV) + '</span></td>';
      html += '<td><span class="role-badge ' + roleClass + '">' + escapeHtml(nv.vaiTro) + '</span></td>';
      html += '<td class="text-center">' + nv.soMayBan_Apple + '</td>';
      html += '<td class="text-center">' + nv.soMayBan_Khac + '</td>';
      html += '<td class="text-center">' + nv.soMayHoTro_Apple + '</td>';
      html += '<td class="text-center">' + nv.soMayHoTro_Khac + '</td>';
      html += '<td class="text-right">' + formatNumber(nv.hhBan) + 'đ</td>';
      html += '<td class="text-right">' + formatNumber(nv.hhHoTro) + 'đ</td>';
      html += '<td class="text-right">' + formatNumber(nv.doanhThuDV) + 'đ</td>';
      html += '<td class="text-right">' + formatNumber(nv.thuong) + 'đ</td>';
      html += '<td class="text-right" style="font-weight:bold;color:#137333;">' + formatNumber(nv.tongThuNhap) + 'đ</td>';

      tr.innerHTML = html;
      tbody.appendChild(tr);
    });

    document.getElementById('ds-lblThangNam').innerText = result.thangNam;
    document.getElementById('ds-reportArea').style.display = 'block';
  }

  function yeuCauChotDoanhSo() {
    let thang = parseInt(document.getElementById('ds-thang').value);
    let nam = parseInt(document.getElementById('ds-nam').value);

    if (isNaN(thang) || isNaN(nam)) {
      showAlertMsg('error', 'Vui lòng chọn Tháng và Năm hợp lệ!');
      return;
    }

    let confirmMsg = 'Bạn có chắc chắn muốn chốt doanh số tháng ' + thang + '/' + nam + '?';
    confirmMsg += '\nHành động này có thể ghi đè dữ liệu cũ trên sheet Doanh số nếu tháng này đã được chốt trước đó.';
    
    if (!confirm(confirmMsg)) {
      return;
    }

    setLoading('btnChotDS', true);

    google.script.run
      .withSuccessHandler(function(success) {
        setLoading('btnChotDS', false);
        if (success) {
          showAlertMsg('success', 'Đã chốt doanh số tháng ' + thang + '/' + nam + ' thành công!');
          xemBaoCaoDoanhSo();
        } else {
          showAlertMsg('error', 'hốt doanh số không thành công.');
        }
      })
      .withFailureHandler(function(err) {
        setLoading('btnChotDS', false);
        showAlertMsg('error', 'Lỗi chốt doanh số: ' + err.message);
      })
      .chotDoanhSoThang(thang, nam);
  }

  function extractCustomerName(str) {
    if (!str) return '';
    let parts = str.split(' - ');
    if (parts.length > 1) {
      let namePart = parts[1].trim();
      return namePart.replace(/\s*\(.*?\)$/, '');
    }
    return str;
  }

  function onKHChange(prefix) {
    let inputEl = document.getElementById(prefix + '-khachHang');
    let maKHEl = document.getElementById(prefix + '-maKH');
    let sdtEl = document.getElementById(prefix + '-sdtKH');
    if (!inputEl) return;

    let val = inputEl.value;
    if (!val) {
      if (maKHEl) maKHEl.value = '';
      if (sdtEl) sdtEl.value = '';
      return;
    }

    let parts = val.split(' - ');
    let maKH = parts[0].trim();
    if (maKHEl) maKHEl.value = maKH;

    if (sdtEl) {
      let match = val.match(/\((.*?)\)$/);
      if (match) {
        sdtEl.value = match[1].trim();
      } else if (/^\d+$/.test(maKH)) {
        sdtEl.value = maKH;
      }
    }
  }

  // ==================== HYBRID PAYMENT FUNCTIONS ====================

  function getDonHangThanhTien() {
    let giamGia = Number(document.getElementById('dh-tienGiamGia').value) || 0;
    let sourceSelect = document.getElementById('dh-nguonSP');
    let source = sourceSelect ? sourceSelect.value : '';
    if (source === 'Phụ kiện') {
      let rows = document.querySelectorAll('#dh-accessories-list tr');
      let grandTotal = 0;
      rows.forEach(function(row) {
        let qty = parseInt(row.querySelector('.acc-qty').value) || 0;
        let price = parseFloat(row.querySelector('.acc-price').value) || 0;
        grandTotal += (qty * price);
      });
      return Math.max(0, grandTotal - giamGia);
    } else {
      let soLuong = Number(document.getElementById('dh-soLuong').value) || 0;
      let donGia = Number(document.getElementById('dh-donGia').value) || 0;
      return Math.max(0, (soLuong * donGia) - giamGia);
    }
  }

  function onPaymentMethodChange(prefix) {
    let selectEl = document.getElementById(prefix + '-hinhThucTT');
    let httt = selectEl.value;
    let splitRow = document.getElementById(prefix + '-split-payment-row');
    if (!splitRow) return;

    if (httt === 'Hỗn hợp') {
      splitRow.style.display = 'flex';
      
      let htb = '';
      if (prefix === 'dh') {
        htb = document.getElementById('dh-hinhThucBan') ? document.getElementById('dh-hinhThucBan').value : '';
      } else if (prefix === 'tm-Moi') {
        htb = document.getElementById('tm-hinhThucBan') ? document.getElementById('tm-hinhThucBan').value : '';
      }

      let total = 0;
      if (htb === 'Trả góp' && prefix === 'dh') {
        total = getDonHangThanhTien();
      } else {
        total = getAmountToPay(prefix);
      }

      document.getElementById(prefix + '-split-tienMat').value = total;
      document.getElementById(prefix + '-split-chuyenKhoan').value = 0;

      // Màu sắc theo tông màu của từng phân hệ
      if (prefix === 'dh' || prefix === 'tt' || prefix === 'dv' || prefix === 'tm-Moi') {
        selectEl.style.background = '#e8f0fe';
        selectEl.style.borderColor = '#a8c7fa';
      } else if (prefix === 'tm-Thu') {
        selectEl.style.background = '#f1f3f4';
        selectEl.style.borderColor = '#dadce0';
      } else if (prefix === 'dt') {
        selectEl.style.background = '#fdf3f3';
        selectEl.style.borderColor = '#f5c6cb';
      }
    } else {
      splitRow.style.display = 'none';
      document.getElementById(prefix + '-split-tienMat').value = 0;
      document.getElementById(prefix + '-split-chuyenKhoan').value = 0;

      // Khôi phục mặc định
      selectEl.style.background = '#fff';
      selectEl.style.borderColor = '#dadce0';

      // Đánh dấu màu đặc biệt cho "Trừ vào đơn mới"
      if (httt === 'Trừ vào đơn mới') {
        selectEl.style.background = '#fef7e0';
        selectEl.style.borderColor = '#f9ab00';
      }
    }

    // Xử lý ẩn/hiện ô Trả trước khi chọn Hỗn hợp + Trả góp
    if (prefix === 'dh') {
      let htb = document.getElementById('dh-hinhThucBan') ? document.getElementById('dh-hinhThucBan').value : '';
      let traTruocGroup = document.getElementById('tg-traTruoc') ? document.getElementById('tg-traTruoc').closest('.form-group') : null;
      if (traTruocGroup) {
        if (htb === 'Trả góp' && httt === 'Hỗn hợp') {
          traTruocGroup.style.display = 'none';
        } else {
          traTruocGroup.style.display = '';
        }
      }
      if (htb === 'Trả góp') {
        tinhTraGop();
      }
    } else if (prefix === 'tm') {
      let htb = document.getElementById('tm-hinhThucBan') ? document.getElementById('tm-hinhThucBan').value : '';
      let traTruocGroup = document.getElementById('tm-tg-traTruoc') ? document.getElementById('tm-tg-traTruoc').closest('.form-group') : null;
      if (traTruocGroup) {
        if (htb === 'Trả góp' && httt === 'Hỗn hợp') {
          traTruocGroup.style.display = 'none';
        } else {
          traTruocGroup.style.display = '';
        }
      }
      if (htb === 'Trả góp') {
        tinhThuMuaTraGop();
      }
    }
  }

  function getAmountToPay(prefix) {
    if (prefix === 'dh') {
      let htb = document.getElementById('dh-hinhThucBan').value;
      if (htb === 'Trả góp') {
        let httt = document.getElementById('dh-hinhThucTT') ? document.getElementById('dh-hinhThucTT').value : '';
        if (httt === 'Hỗn hợp') {
          let tm = Number(document.getElementById('dh-split-tienMat').value) || 0;
          let ck = Number(document.getElementById('dh-split-chuyenKhoan').value) || 0;
          return tm + ck;
        }
        return Number(document.getElementById('tg-traTruoc').value) || 0;
      }
      return getDonHangThanhTien();
    } else if (prefix === 'tm-Thu') {
      let giaThu = Number(document.getElementById('tm-giaThuMua').value) || 0;
      let loai = document.getElementById('tm-loaiGD').value;
      if (loai === 'Thu cũ đổi mới') {
        let hoTro = Number(document.getElementById('tm-tienHoTro').value) || 0;
        let truAmt = Number(document.getElementById('tm-truDonMoiAmt').value) || 0;
        return Math.max(0, giaThu + hoTro - truAmt);
      }
      return giaThu;
    } else if (prefix === 'tm-Moi') {
      let htb = document.getElementById('tm-hinhThucBan').value;
      if (htb === 'Trả góp') {
        return Number(document.getElementById('tm-tg-traTruoc').value) || 0;
      }
      let giaMoi = getThuMuaGiaMayMoi();
      let giamGia = Number(document.getElementById('tm-tienGiamGia').value) || 0;
      return Math.max(0, giaMoi - giamGia);
    } else if (prefix === 'dt') {
      return Math.abs(Number(document.getElementById('dt-tienHoanTra').value) || 0);
    } else if (prefix === 'tt') {
      return Number(document.getElementById('tt-soTien').value) || 0;
    } else if (prefix === 'dv') {
      let soTien = Number(document.getElementById('dv-soTien').value) || 0;
      let phi = Number(document.getElementById('dv-phi').value) || 0;
      return soTien + phi;
    } else if (prefix === 'bh') {
      return Number(document.getElementById('bh-phiSuaChua').value) || 0;
    }
    return 0;
  }

  function validateSplitPayment(prefix, inputName) {
    let activeId = document.activeElement ? document.activeElement.id : '';
    let edited = inputName;
    if (!edited) {
      if (activeId === prefix + '-split-chuyenKhoan') {
        edited = 'chuyenKhoan';
      } else {
        edited = 'tienMat';
      }
    }

    let tmInput = document.getElementById(prefix + '-split-tienMat');
    let ckInput = document.getElementById(prefix + '-split-chuyenKhoan');
    if (!tmInput || !ckInput) return;

    let tm = Number(tmInput.value) || 0;
    let ck = Number(ckInput.value) || 0;

    let htb = '';
    if (prefix === 'dh') {
      htb = document.getElementById('dh-hinhThucBan') ? document.getElementById('dh-hinhThucBan').value : '';
    } else if (prefix === 'tm') {
      htb = document.getElementById('tm-hinhThucBan') ? document.getElementById('tm-hinhThucBan').value : '';
    }
    
    let httt = document.getElementById(prefix + '-hinhThucTT') ? document.getElementById(prefix + '-hinhThucTT').value : '';

    if (htb === 'Trả góp' && httt === 'Hỗn hợp') {
      if (prefix === 'dh') {
        let thanhTien = getDonHangThanhTien();
        let maxAllowed = Math.max(0, thanhTien - 1000);
        if (edited === 'tienMat') {
          if (tm < 0) tm = 0;
          if (tm > maxAllowed) tm = maxAllowed;
          if (tm + ck > maxAllowed) {
            ck = maxAllowed - tm;
          }
        } else {
          if (ck < 0) ck = 0;
          if (ck > maxAllowed) ck = maxAllowed;
          if (tm + ck > maxAllowed) {
            tm = maxAllowed - ck;
          }
        }
        tmInput.value = tm;
        ckInput.value = ck;
        tinhTraGop();
      } else if (prefix === 'tm') {
        let giaThu = Number(document.getElementById('tm-giaThuMua').value) || 0;
        let giaMoi = getThuMuaGiaMayMoi();
        let hoTro = Number(document.getElementById('tm-tienHoTro').value) || 0;
        let giamGia = Number(document.getElementById('tm-tienGiamGia').value) || 0;
        let giaMayMoi = giaMoi - giamGia - hoTro;
        
        let minPayback = Math.max(0, giaThu - giaMayMoi + 1000);
        let maxPayback = giaThu;

        if (edited === 'tienMat') {
          if (tm < 0) tm = 0;
          if (tm > maxPayback) tm = maxPayback;
          if (tm + ck > maxPayback) {
            ck = maxPayback - tm;
          } else if (tm + ck < minPayback) {
            ck = minPayback - tm;
          }
        } else {
          if (ck < 0) ck = 0;
          if (ck > maxPayback) ck = maxPayback;
          if (tm + ck > maxPayback) {
            tm = maxPayback - ck;
          } else if (tm + ck < minPayback) {
            tm = minPayback - ck;
          }
        }
        tmInput.value = tm;
        ckInput.value = ck;
        tinhThuMuaTraGop();
      }
    } else {
      let total = getAmountToPay(prefix);
      if (edited === 'tienMat') {
        if (tm > total) {
          tm = total;
        } else if (tm < 0) {
          tm = 0;
        }
        tmInput.value = tm;
        ckInput.value = total - tm;
      } else {
        if (ck > total) {
          ck = total;
        } else if (ck < 0) {
          ck = 0;
        }
        ckInput.value = ck;
        tmInput.value = total - ck;
      }
    }
  }

  function updateSplitPaymentAmounts(prefix) {
    let htttSelect = document.getElementById(prefix + '-hinhThucTT');
    if (!htttSelect) return;
    let httt = htttSelect.value;
    if (httt !== 'Hỗn hợp') return;

    let htb = '';
    if (prefix === 'dh') {
      htb = document.getElementById('dh-hinhThucBan') ? document.getElementById('dh-hinhThucBan').value : '';
    } else if (prefix === 'tm') {
      htb = document.getElementById('tm-hinhThucBan') ? document.getElementById('tm-hinhThucBan').value : '';
    }

    let tmInput = document.getElementById(prefix + '-split-tienMat');
    let ckInput = document.getElementById(prefix + '-split-chuyenKhoan');
    if (!tmInput || !ckInput) return;

    if (htb === 'Trả góp' && httt === 'Hỗn hợp') {
      validateSplitPayment(prefix, 'tienMat');
      return;
    }

    let total = getAmountToPay(prefix);
    let tm = Number(tmInput.value) || 0;
    let ck = total - tm;
    if (ck < 0) {
      ck = 0;
      tm = total;
    }
    tmInput.value = tm;
    ckInput.value = ck;
  }

  function formatPaymentAmount(n) {
    return Math.round(Number(n) || 0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  }

  function getPaymentMethodString(prefix) {
    return document.getElementById(prefix + '-hinhThucTT').value;
  }

  function submitBaoHanh() {
    let maKH = extractId(document.getElementById('bh-maKH').value);
    let tenKH = extractCustomerName(document.getElementById('bh-maKH').value);

    let data = {
      chiNhanh: document.getElementById('bh-chiNhanh').value,
      loaiDichVu: document.getElementById('bh-loaiDichVu').value,
      maKH: maKH,
      tenKH: tenKH,
      tenSP: document.getElementById('bh-tenSP').value,
      tinhTrangLoi: document.getElementById('bh-tinhTrangLoi').value,
      phiSuaChua: Number(document.getElementById('bh-phiSuaChua').value) || 0,
      hinhThucThanhToan: document.getElementById('bh-hinhThucTT').value,
      splitTienMat: Number(document.getElementById('bh-split-tienMat').value) || 0,
      splitChuyenKhoan: Number(document.getElementById('bh-split-chuyenKhoan').value) || 0,
      nguoiTiepNhan: extractId(document.getElementById('bh-nguoiTiepNhan').value),
      nguoiSua: extractId(document.getElementById('bh-nguoiSua').value),
      ghiChu: document.getElementById('bh-ghiChu').value
    };

    if (!data.chiNhanh) return showAlertMsg('error', 'Vui lòng chọn chi nhánh!');
    if (!data.tenKH) return showAlertMsg('error', 'Vui lòng nhập tên khách hàng!');
    if (!data.tenSP) return showAlertMsg('error', 'Vui lòng nhập tên sản phẩm!');
    if (!data.tinhTrangLoi) return showAlertMsg('error', 'Vui lòng nhập tình trạng lỗi!');
    if (!data.nguoiTiepNhan) return showAlertMsg('error', 'Vui lòng chọn người tiếp nhận!');

    if (data.hinhThucThanhToan === 'Hỗn hợp') {
      if (Math.abs(data.splitTienMat + data.splitChuyenKhoan - data.phiSuaChua) > 1) {
        return showAlertMsg('error', 'Tổng số tiền chia không khớp với Phí sửa chữa!');
      }
    }

    setLoading('btnTaoBH', true);
    google.script.run
      .withSuccessHandler(function(res) {
        setLoading('btnTaoBH', false);
        showAlertMsg('success', 'Tạo Phiếu Tiếp Nhận thành công: ' + escapeHtml(res));
        document.getElementById('bh-maKH').value = '';
        document.getElementById('bh-tenSP').value = '';
        document.getElementById('bh-tinhTrangLoi').value = '';
        document.getElementById('bh-phiSuaChua').value = '0';
        document.getElementById('bh-split-tienMat').value = '0';
        document.getElementById('bh-split-chuyenKhoan').value = '0';
        document.getElementById('bh-nguoiSua').value = '';
        document.getElementById('bh-ghiChu').value = '';
        updateSplitPaymentAmounts('bh');
      })
      .withFailureHandler(function(err) {
        setLoading('btnTaoBH', false);
        showAlertMsg('error', err.message);
      })
      .taoBaoHanh(data);
  }
