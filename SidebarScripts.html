<script>
  // ==================== NAV TABS ====================
  document.querySelectorAll('.nav-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      // Update active tab
      document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');

      // Show corresponding section
      var sectionId = 'section-' + this.dataset.section;
      document.querySelectorAll('.form-section').forEach(function(s) { s.classList.remove('active'); });
      var activeSec = document.getElementById(sectionId);
      if (activeSec) activeSec.classList.add('active');

      hideAlert();
    });
  });

  // ==================== ALERT ====================
  function showAlertMsg(type, msg) {
    var box = document.getElementById('alertBox');
    box.className = 'alert alert-' + type + ' show';
    box.innerHTML = msg;
    // Auto hide after 5s for success
    if (type === 'success') {
      setTimeout(function() { box.classList.remove('show'); }, 5000);
    }
  }

  // Helper to append options with Vietnamese accents for datalist and selectors
  function hideAlert() {
    document.getElementById('alertBox').classList.remove('show');
  }

  // ==================== LOADING ====================
  function setLoading(btnId, loading) {
    var btn = document.getElementById(btnId);
    if (!btn) return;
    if (loading) {
      btn.disabled = true;
      btn.dataset.originalText = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span> Đang xử lý...';
    } else {
      btn.disabled = false;
      btn.innerHTML = btn.dataset.originalText || btn.innerHTML;
    }
  }

  var branchesCached = [];
  var localCache = {
    dienThoai: [],
    phuKien: [],
    phuKienUnique: []
  };

  function removeAccents(str) {
    if (!str) return '';
    return str.normalize('NFD')
              .replace(/[\u0300-\u036f]/g, '')
              .replace(/đ/g, 'd')
              .replace(/Đ/g, 'D');
  }

  function matchSearchKeyword(text, keyword) {
    if (!text || !keyword) return false;
    var normText = removeAccents(text.toLowerCase());
    var normKeyword = removeAccents(keyword.toLowerCase());
    var words = normKeyword.split(/\s+/).filter(Boolean);
    return words.every(function(word) {
      return normText.indexOf(word) !== -1;
    });
  }

  function searchDienThoaiLocal(branch, keyword) {
    if (!branch) return [];
    var items = localCache.dienThoai || [];
    return items.filter(function(item) {
      if (String(item.chiNhanh || "").toLowerCase() !== String(branch).toLowerCase()) {
        return false;
      }
      if (!keyword) return true;
      return matchSearchKeyword(item.text, keyword) || matchSearchKeyword(item.value, keyword);
    });
  }

  function searchPhuKienLocal(branch, keyword) {
    if (!branch) return [];
    var items = localCache.phuKien || [];
    return items.filter(function(item) {
      if (String(item.chiNhanh || "").toLowerCase() !== String(branch).toLowerCase()) {
        return false;
      }
      if (!keyword) return true;
      return matchSearchKeyword(item.text, keyword) || matchSearchKeyword(item.value, keyword);
    });
  }

  function searchPhuKienUniqueLocal(keyword) {
    var items = localCache.phuKienUnique || [];
    if (!keyword) return items;
    return items.filter(function(item) {
      return matchSearchKeyword(item.text, keyword) || matchSearchKeyword(item.value, keyword);
    });
  }

  function preloadInventoryData(callback) {
    google.script.run.withSuccessHandler(function(data) {
      if (data) {
        localCache.dienThoai = data.dienThoai || [];
        localCache.phuKien = data.phuKien || [];
        localCache.phuKienUnique = data.phuKienUnique || [];
      }
      if (callback) callback();
    }).getPreloadData();
  }

  var originalOrderPrice = 0;
  var originalOrderData = null;

  // ==================== INIT — LOAD DATA ====================
  function init() {
    preloadInventoryData();
    // Set default month/year for Doanh số
    var now = new Date();
    var curMonth = now.getMonth() + 1;
    var curYear = now.getFullYear();
    var dsThang = document.getElementById('ds-thang');
    if (dsThang) dsThang.value = curMonth;
    var dsNam = document.getElementById('ds-nam');
    if (dsNam) dsNam.value = curYear;

    // Load branches
    google.script.run.withSuccessHandler(function(items) {
      branchesCached = items;
      populateSelect('dh-chiNhanh', items);
      populateSelect('nk-chiNhanh', items);
      populateSelect('dv-chiNhanh', items);
      populateSelect('ck-cnNguon', items);
      populateSelect('ck-cnDich', items);
      populateSelect('dt-chiNhanh', items);
      populateSelect('tm-chiNhanh', items);
      populateSelect('bh-chiNhanh', items);
    }).getBranchesDropdown();

    // Load branches

    // Load staff
    google.script.run.withSuccessHandler(function(items) {
      populateDatalist('dh-nguoiBan', 'dh-nguoiBan-list', items);
      populateDatalist('dh-nguoiHoTro', 'dh-nguoiHoTro-list', items, true);
      populateDatalist('dv-nguoiThucHien', 'dv-nguoiThucHien-list', items);
      populateDatalist('dt-nguoiThucHien', 'dt-nguoiThucHien-list', items);
      populateDatalist('tm-nguoiThucHien', 'tm-nguoiThucHien-list', items);
      populateDatalist('bh-nguoiTiepNhan', 'bh-nguoiTiepNhan-list', items);
      populateDatalist('bh-nguoiSua', 'bh-nguoiSua-list', items);
    }).getNhanVienDropdown();

    // Load finance companies
    google.script.run.withSuccessHandler(function(items) {
      populateSelect('tg-congTyTC', items);
      populateSelect('tm-tg-congTyTC', items);
    }).getFinanceCompaniesDropdown();

    // Load phone brands
    google.script.run.withSuccessHandler(function(items) {
      populateSelect('nk-thuongHieu', items);
      populateSelect('tm-thuongHieu-Thu', items);
    }).getBrandsDropdown();

    // Removed preloads for dynamic search (Khach hang, Phu kien cu, Tra gop)

    // Load initial mode tab
    if (typeof initialMode !== 'undefined' && initialMode) {
      var activeTab = document.querySelector('.nav-tab[data-section="' + initialMode + '"]');
      if (activeTab) {
        activeTab.click();
      }
    }

    // Set up dynamic search (>= 4 characters) for large datasets
    setupDatalistSearch('dh-maKH', 'dh-maKH-list', function(query, callback) {
      google.script.run.withSuccessHandler(callback).getKhachHangDropdownSearch(query);
    });
    setupDatalistSearch('tm-maKH', 'tm-maKH-list', function(query, callback) {
      google.script.run.withSuccessHandler(callback).getKhachHangDropdownSearch(query);
    });
    setupDatalistSearch('bh-khachHang', 'bh-khachHang-list', function(query, callback) {
      google.script.run.withSuccessHandler(callback).getKhachHangDropdownSearch(query);
    });
    setupDatalistSearch('dh-maSP', 'dh-maSP-list', function(query, callback) {
      var branch = document.getElementById('dh-chiNhanh').value;
      var source = document.getElementById('dh-nguonSP').value;
      if (!branch) return callback([]);
      if (source === 'Điện thoại') {
        callback(searchDienThoaiLocal(branch, query));
      } else {
        callback(searchPhuKienLocal(branch, query));
      }
    });
    setupDatalistSearch('ck-maSP', 'ck-maSP-list', function(query, callback) {
      var branch = document.getElementById('ck-cnNguon').value;
      if (!branch) return callback([]);
      callback(searchDienThoaiLocal(branch, query));
    });
    setupDatalistSearch('dt-maSP-Nhan', 'dt-maSP-Nhan-list', function(query, callback) {
      var branch = document.getElementById('dt-chiNhanh').value;
      if (!branch) return callback([]);
      var doiTuong = document.getElementById('dt-doiTuong').value;
      if (doiTuong === 'Quà tặng kèm') {
        callback(searchPhuKienLocal(branch, query));
      } else {
        var loaiGD = document.getElementById('dt-loaiGD').value;
        if (loaiGD === 'Đổi máy') {
          callback(searchDienThoaiLocal(branch, query));
        } else {
          callback(searchPhuKienLocal(branch, query));
        }
      }
    });
    setupDatalistSearch('tm-maSP-Moi', 'tm-maSP-Moi-list', function(query, callback) {
      var branch = document.getElementById('tm-chiNhanh').value;
      if (!branch) return callback([]);
      callback(searchDienThoaiLocal(branch, query));
    });
    setupDatalistSearch('tt-maTG', 'tt-maTG-list', function(query, callback) {
      google.script.run.withSuccessHandler(callback).getTraGopDropdownSearch(query);
    });
    setupDatalistSearch('nk-pkCu-maSP', 'nk-pkCu-maSP-list', function(query, callback) {
      callback(searchPhuKienUniqueLocal(query));
    });

    setupMultiSelectDatalist('dh-maQuaTang', 'dh-maQuaTang-list');
    setupMultiSelectDatalist('tm-maQuaTang', 'tm-maQuaTang-list');
    setupMultiSelectDatalist('dh-nguoiHoTro', 'dh-nguoiHoTro-list');
  }

  function loadPhuKienCuDropdown() {
    var items = localCache.phuKienUnique || [];
    populateDatalist('nk-pkCu-maSP', 'nk-pkCu-maSP-list', items);
  }

  function loadTraGopDropdown() {
    google.script.run.withSuccessHandler(function(items) {
      populateDatalist('tt-maTG', 'tt-maTG-list', items);
    }).getTraGopDropdown();
  }

  function populateSelect(selectId, items, addEmpty) {
    var sel = document.getElementById(selectId);
    if (!sel) return;
    var firstOption = sel.options[0];
    sel.innerHTML = '';
    if (firstOption) {
      sel.appendChild(firstOption);
    }

    if (addEmpty) {
      var emptyOpt = document.createElement('option');
      emptyOpt.value = '';
      emptyOpt.textContent = '-- Không --';
      sel.insertBefore(emptyOpt, sel.firstChild);
    }

    items.forEach(function(item) {
      var opt = document.createElement('option');
      opt.value = item.value;
      opt.textContent = item.text;
      if (item.giaBan !== undefined) opt.dataset.giaBan = item.giaBan;
      if (item.giaTraGop !== undefined) opt.dataset.giaTraGop = item.giaTraGop;
      if (item.soTienCanTra !== undefined) opt.dataset.soTienCanTra = item.soTienCanTra;
      if (item.tienMoiKy !== undefined) opt.dataset.tienMoiKy = item.tienMoiKy;
      sel.appendChild(opt);
    });
  }

  function extractId(val, isMulti) {
    if (!val) return '';
    if (isMulti && val.indexOf(',') !== -1) {
      return val.split(',').map(function(item) {
        return extractIdSingle(item.trim());
      }).filter(Boolean).join(', ');
    }
    return extractIdSingle(val);
  }

  function extractImei(val) {
    if (!val) return '';
    var match = val.match(/IMEI:\s*([^\s\|)]+)/i);
    return match ? match[1].trim() : '';
  }

  function extractIdSingle(val) {
    if (!val) return '';
    var parts = val.split(' - ');
    var prefix = parts[0].trim();
    if (prefix.indexOf('Kỳ') === 0) {
      return prefix.replace('Kỳ', '').trim();
    }
    return prefix;
  }

  function setupMultiSelectDatalist(inputId, listId) {
    var originalInput = document.getElementById(inputId);
    if (!originalInput) return;

    var container = document.createElement('div');
    container.className = 'tag-container';
    
    var tagInput = document.createElement('input');
    tagInput.type = 'text';
    tagInput.className = 'tag-input-field';
    tagInput.placeholder = originalInput.placeholder || 'Gõ để tìm...';
    tagInput.setAttribute('list', listId);

    originalInput.parentNode.insertBefore(container, originalInput);
    container.appendChild(tagInput);
    originalInput.style.display = 'none';

    var tags = [];

    function syncValue() {
      var joinedVal = tags.map(function(t) { return t.text; }).join(', ');
      var descriptor = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value');
      descriptor.set.call(originalInput, joinedVal);
      
      var event = document.createEvent('HTMLEvents');
      event.initEvent('change', true, false);
      originalInput.dispatchEvent(event);
    }

    function addTag(text) {
      text = text.trim();
      if (!text) return;
      
      if (text.indexOf(',') !== -1) {
        var parts = text.split(',');
        parts.forEach(function(p) {
          addTag(p);
        });
        tagInput.value = '';
        return;
      }

      var exists = tags.some(function(t) { return t.text === text; });
      if (exists) {
        tagInput.value = '';
        return;
      }
      
      var tagEl = document.createElement('span');
      tagEl.className = 'tag';
      tagEl.textContent = text;
      
      var closeBtn = document.createElement('span');
      closeBtn.className = 'tag-close';
      closeBtn.innerHTML = '&times;';
      closeBtn.onclick = function(e) {
        e.stopPropagation();
        if (tagEl.parentNode) {
          container.removeChild(tagEl);
        }
        tags = tags.filter(function(t) { return t.element !== tagEl; });
        syncValue();
      };
      
      tagEl.appendChild(closeBtn);
      container.insertBefore(tagEl, tagInput);
      
      tags.push({ text: text, element: tagEl });
      tagInput.value = '';
      syncValue();
    }

    originalInput.clearTags = function() {
      tags.forEach(function(t) {
        if (t.element.parentNode) {
          container.removeChild(t.element);
        }
      });
      tags = [];
      tagInput.value = '';
      var descriptor = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value');
      descriptor.set.call(originalInput, '');
    };

    originalInput.setTagsFromValue = function(val) {
      tags.forEach(function(t) {
        if (t.element.parentNode) {
          container.removeChild(t.element);
        }
      });
      tags = [];
      
      if (val) {
        var parts = val.split(',');
        parts.forEach(function(p) {
          addTag(p.trim());
        });
      }
    };

    var nativeValueDesc = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value');
    Object.defineProperty(originalInput, 'value', {
      get: function() {
        return nativeValueDesc.get.call(originalInput);
      },
      set: function(val) {
        nativeValueDesc.set.call(originalInput, val);
        originalInput.setTagsFromValue(val);
      },
      configurable: true
    });

    tagInput.addEventListener('input', function() {
      var val = tagInput.value;
      var dl = document.getElementById(listId);
      if (!dl) return;
      var opts = dl.querySelectorAll('option');
      for (var i = 0; i < opts.length; i++) {
        if (opts[i].value === val) {
          addTag(val);
          break;
        }
      }
    });

    tagInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        addTag(tagInput.value);
      } else if (e.key === ',') {
        e.preventDefault();
        addTag(tagInput.value);
      } else if (e.key === 'Backspace' && tagInput.value === '') {
        if (tags.length > 0) {
          var lastTag = tags.pop();
          if (lastTag.element.parentNode) {
            container.removeChild(lastTag.element);
          }
          syncValue();
        }
      }
    });

    container.addEventListener('click', function() {
      tagInput.focus();
    });
  }

  function populateDatalist(inputId, listId, items, addEmpty) {
    var dl = document.getElementById(listId);
    if (!dl) return;
    dl.innerHTML = '';

    if (addEmpty) {
      var emptyOpt = document.createElement('option');
      emptyOpt.value = '';
      dl.appendChild(emptyOpt);
    }

    items.forEach(function(item) {
      var opt = document.createElement('option');
      opt.value = item.text || item.value;
      opt.dataset.id = item.value;
      if (item.giaBan !== undefined) opt.dataset.giaBan = item.giaBan;
      if (item.giaTraGop !== undefined) opt.dataset.giaTraGop = item.giaTraGop;
      if (item.soTienCanTra !== undefined) opt.dataset.soTienCanTra = item.soTienCanTra;
      if (item.tienMoiKy !== undefined) opt.dataset.tienMoiKy = item.tienMoiKy;
      dl.appendChild(opt);
    });
  }

  function setupDatalistSearch(inputId, listId, searchFunc) {
    var input = document.getElementById(inputId);
    if (!input) return;

    var debounceTimeout = null;

    input.addEventListener('input', function() {
      var val = input.value.trim();
      var dl = document.getElementById(listId);
      if (!dl) return;

      var isLocal = (inputId === 'dh-maSP' || inputId === 'ck-maSP' || inputId === 'dt-maSP-Nhan' || inputId === 'tm-maSP-Moi' || inputId === 'nk-pkCu-maSP');
      var minLength = isLocal ? 1 : 4;

      if (val.length < minLength) {
        dl.innerHTML = '';
        return;
      }

      if (isLocal) {
        // Skip search if value is an exact match for one of the cached items' text
        var items = [];
        if (inputId === 'dh-maSP') {
          var source = document.getElementById('dh-nguonSP').value;
          items = (source === 'Điện thoại') ? (localCache.dienThoai || []) : (localCache.phuKien || []);
        } else if (inputId === 'ck-maSP' || inputId === 'tm-maSP-Moi') {
          items = localCache.dienThoai || [];
        } else if (inputId === 'dt-maSP-Nhan') {
          var doiTuong = document.getElementById('dt-doiTuong').value;
          if (doiTuong === 'Quà tặng kèm') {
            items = localCache.phuKien || [];
          } else {
            var loaiGD = document.getElementById('dt-loaiGD').value;
            items = (loaiGD === 'Đổi máy') ? (localCache.dienThoai || []) : (localCache.phuKien || []);
          }
        } else if (inputId === 'nk-pkCu-maSP') {
          items = localCache.phuKien || [];
        }

        var exactMatch = items.some(function(item) {
          return item.text === val;
        });

        if (exactMatch) {
          dl.innerHTML = '';
          return;
        }
      }

      clearTimeout(debounceTimeout);

      if (isLocal) {
        searchFunc(val, function(items) {
          populateDatalist(inputId, listId, items || []);
        });
      } else {
        dl.innerHTML = '';
        var loadOpt = document.createElement('option');
        loadOpt.value = '\u23F3 \u0110ang t\u00ECm ki\u1EBFm...';
        dl.appendChild(loadOpt);

        debounceTimeout = setTimeout(function() {
          searchFunc(val, function(items) {
            populateDatalist(inputId, listId, items || []);
          });
        }, 500);
      }
    });
  }

  // ==================== EVENT HANDLERS ====================

  function onDonHangBranchOrNguonChange() {
    var branch = document.getElementById('dh-chiNhanh').value;
    var source = document.getElementById('dh-nguonSP').value;
    var spInput = document.getElementById('dh-maSP');
    var quaInput = document.getElementById('dh-maQuaTang');
    var spList = document.getElementById('dh-maSP-list');
    var quaList = document.getElementById('dh-maQuaTang-list');

    var htbSelect = document.getElementById('dh-hinhThucBan');
    var accContainer = document.getElementById('dh-accessories-container');
    var stdQtyPriceRow = document.getElementById('dh-standard-qty-price-row');
    var giftRow = document.getElementById('dh-coNhanQua') ? document.getElementById('dh-coNhanQua').parentNode.parentNode : null;

    if (source === 'Điện thoại') {
      if (accContainer) accContainer.style.display = 'none';
      if (stdQtyPriceRow) stdQtyPriceRow.style.display = 'flex';
      if (giftRow) giftRow.style.display = 'flex';
      var accList = document.getElementById('dh-accessories-list');
      if (accList) accList.innerHTML = '';

      document.getElementById('dh-soLuong').value = 1;
      document.getElementById('dh-soLuong').disabled = true;
      if (htbSelect.options.length < 2) {
        var opt = document.createElement('option');
        opt.value = 'Trả góp';
        opt.textContent = 'Trả góp';
        htbSelect.appendChild(opt);
      }
    } else {
      if (accContainer) accContainer.style.display = 'block';
      if (stdQtyPriceRow) stdQtyPriceRow.style.display = 'none';
      if (giftRow) giftRow.style.display = 'none';
      
      var coNhan = document.getElementById('dh-coNhanQua');
      if (coNhan) {
        coNhan.value = '✗';
        onCoNhanQuaChange();
      }

      document.getElementById('dh-soLuong').disabled = false;
      htbSelect.value = 'Bán thẳng';
      if (htbSelect.options.length >= 2) {
        htbSelect.remove(1);
      }
      onHinhThucBanChange();
    }

    spInput.value = '';
    quaInput.value = '';

    if (!branch) {
      spInput.placeholder = 'Chọn chi nhánh trước';
      quaInput.placeholder = 'Chọn chi nhánh trước';
      if (spList) spList.innerHTML = '';
      if (quaList) quaList.innerHTML = '';
      return;
    }

    spInput.placeholder = 'Gõ để tìm kiếm...';
    if (spList) spList.innerHTML = '';

    quaInput.placeholder = 'Gõ để tìm quà tặng...';
    var giftItems = searchPhuKienLocal(branch, '');
    populateDatalist('dh-maQuaTang', 'dh-maQuaTang-list', giftItems);
  }

  function onSanPhamChange() {
    var val = document.getElementById('dh-maSP').value.trim();
    if (!val) return;

    var branch = document.getElementById('dh-chiNhanh').value;
    var source = document.getElementById('dh-nguonSP').value;

    var matchedItem = null;
    if (source === 'Phụ kiện') {
      var items = localCache.phuKien || [];
      for (var i = 0; i < items.length; i++) {
        if (items[i].text === val || items[i].value === val) {
          matchedItem = items[i];
          break;
        }
      }
      if (matchedItem) {
        var id = matchedItem.value;
        var price = Number(matchedItem.giaBan) || 0;
        addAccessoryRow(id, val, price);
        document.getElementById('dh-maSP').value = ''; // Xoá ô nhập liệu để tìm phụ kiện tiếp theo
        var dl = document.getElementById('dh-maSP-list');
        if (dl) dl.innerHTML = '';
      }
    } else {
      var items = localCache.dienThoai || [];
      for (var i = 0; i < items.length; i++) {
        if (items[i].text === val || items[i].value === val) {
          matchedItem = items[i];
          break;
        }
      }
      if (matchedItem) {
        var price = Number(matchedItem.giaBan) || 0;
        var hinhThuc = document.getElementById('dh-hinhThucBan').value;
        if (hinhThuc === 'Trả góp' && matchedItem.giaTraGop) {
          document.getElementById('dh-donGia').value = matchedItem.giaTraGop;
        } else {
          document.getElementById('dh-donGia').value = price;
        }
        tinhThanhTien();
        var dl = document.getElementById('dh-maSP-list');
        if (dl) dl.innerHTML = '';
      }
    }
  }

  function addAccessoryRow(id, name, price) {
    var existingRow = document.querySelector('#dh-accessories-list tr[data-id="' + id + '"]');
    if (existingRow) {
      var qtyInput = existingRow.querySelector('.acc-qty');
      qtyInput.value = parseInt(qtyInput.value) + 1;
      tinhThanhTienAccRow(existingRow);
      return;
    }

    var tbody = document.getElementById('dh-accessories-list');
    var tr = document.createElement('tr');
    tr.setAttribute('data-id', id);
    tr.style.borderBottom = '1px solid #dadce0';

    tr.innerHTML = 
      '<td style="padding: 6px 8px; text-align: left; vertical-align: middle;">' + name + '</td>' +
      '<td style="padding: 6px 8px; text-align: center; vertical-align: middle;"><input type="number" value="1" min="1" class="acc-qty" style="width: 50px; text-align: center; padding: 4px;" onchange="tinhThanhTienAccRow(this.parentNode.parentNode)"></td>' +
      '<td style="padding: 6px 8px; text-align: right; vertical-align: middle;"><input type="number" value="' + price + '" class="acc-price" style="width: 80px; text-align: right; padding: 4px;" onchange="tinhThanhTienAccRow(this.parentNode.parentNode)"></td>' +
      '<td style="padding: 6px 8px; text-align: right; vertical-align: middle;" class="acc-total">' + formatNumber(price) + ' đ</td>' +

  function tinhThanhTienAccRow(row) {
    var qty = parseInt(row.querySelector('.acc-qty').value) || 0;
    var price = parseFloat(row.querySelector('.acc-price').value) || 0;
    var total = qty * price;
    row.querySelector('.acc-total').textContent = formatNumber(total) + ' đ';
    tinhTongTienAcc();
  }

  function removeAccessoryRow(btn) {
    var row = btn.parentNode.parentNode;
    row.parentNode.removeChild(row);
    tinhTongTienAcc();
  }

  function tinhTongTienAcc() {
    var rows = document.querySelectorAll('#dh-accessories-list tr');
    var grandTotal = 0;
    rows.forEach(function(row) {
      var qty = parseInt(row.querySelector('.acc-qty').value) || 0;
      var price = parseFloat(row.querySelector('.acc-price').value) || 0;
      grandTotal += (qty * price);
    });

    var summary = document.getElementById('dh-summary');
    var giamGia = Number(document.getElementById('dh-tienGiamGia').value) || 0;
    var thanhTien = grandTotal - giamGia;

    summary.style.display = 'block';
    summary.innerHTML = '<div class="summary-row summary-total"><span>Thành tiền:</span><span>' +
      formatNumber(thanhTien) + ' đ</span></div>';
    updateSplitPaymentAmounts('dh');
  }

  function tinhDoiTraChenhLech() {
    var loai = document.getElementById('dt-loaiGD').value;
    var phi = Number(document.getElementById('dt-phiDoiTra').value) || 0;
    var label = document.getElementById('dt-tienLabel');
    var valInput = document.getElementById('dt-tienHoanTra');

    if (!originalOrderData) {
      valInput.value = 0;
      return;
    }

    if (loai === 'Trả máy' || loai === 'Trả hàng') {
      var hoanTien = originalOrderPrice - phi;
      label.textContent = 'Tiền hoàn trả cho khách (VND)';
      valInput.value = hoanTien;
    } else if (loai === 'Đổi quà') {
      label.textContent = 'Tiền thanh toán (Phí)';
      valInput.value = phi;
    } else {
      var val = document.getElementById('dt-maSP-Nhan').value.trim();
      var doiTuong = document.getElementById('dt-doiTuong').value;
      
      var items = [];
      if (doiTuong === 'Quà tặng kèm') {
        items = localCache.phuKien || [];
      } else {
        var loaiGD = document.getElementById('dt-loaiGD').value;
        items = (loaiGD === 'Đổi máy') ? (localCache.dienThoai || []) : (localCache.phuKien || []);
      }
      
      var giaMoi = 0;
      for (var i = 0; i < items.length; i++) {
        if (items[i].text === val || items[i].value === val) {
          giaMoi = Number(items[i].giaBan) || 0;
          break;
        }
      }

      var diff = originalOrderPrice - giaMoi - phi;
      if (diff >= 0) {
        label.textContent = 'Tiền cửa hàng trả lại khách (VND)';
        valInput.value = diff;
      } else {
        label.textContent = 'Tiền khách cần đóng thêm (VND)';
        valInput.value = Math.abs(diff);
      }
    }
    updateSplitPaymentAmounts('dt');
  }

  function getThuMuaGiaMayMoi() {
    var phoneInput = document.getElementById('tm-maSP-Moi');
    if (phoneInput && phoneInput.dataset.selectedGiaBan) {
      var g = Number(phoneInput.dataset.selectedGiaBan);
      if (g > 0) return g;
    }
    
    var val = document.getElementById('tm-maSP-Moi').value.trim();
    var items = localCache.dienThoai || [];
    var giaMoi = 0;
    for (var i = 0; i < items.length; i++) {
      if (items[i].text === val || items[i].value === val) {
        giaMoi = Number(items[i].giaBan) || 0;
        break;
      }
    }
    if (phoneInput && giaMoi > 0) {
      phoneInput.dataset.selectedGiaBan = giaMoi;
    }
    return giaMoi;
  }

  function tinhThuMuaTraGop(customChenhLech) {
    var giaThu = Number(document.getElementById('tm-giaThuMua').value) || 0;
    var giaMoi = getThuMuaGiaMayMoi();
    var hoTro = Number(document.getElementById('tm-tienHoTro').value) || 0;
    var giamGia = Number(document.getElementById('tm-tienGiamGia').value) || 0;
    var giaMayMoi = giaMoi - giamGia - hoTro;

    var loai = document.getElementById('tm-tg-loai').value;
    var isCTTC = (loai === 'Công ty tài chính');

    document.getElementById('tm-tg-congTyTCGroup').style.display = isCTTC ? 'block' : 'none';
    document.getElementById('tm-tg-tienMoiKyGroup').style.display = isCTTC ? 'block' : 'none';

    var httt = document.getElementById('tm-Moi-hinhThucTT') ? document.getElementById('tm-Moi-hinhThucTT').value : '';
    var traTruoc = 0;
    if (httt === 'Hỗn hợp') {
      var tm = Number(document.getElementById('tm-Moi-split-tienMat').value) || 0;
      var ck = Number(document.getElementById('tm-Moi-split-chuyenKhoan').value) || 0;
      traTruoc = tm + ck;
    } else {
      traTruoc = Number(document.getElementById('tm-tg-traTruoc').value) || 0;
    }

    var soKy = Number(document.getElementById('tm-tg-soKy').value) || 1;
    var conLai = giaMayMoi - traTruoc;

    if (conLai <= 0) {
      document.getElementById('tm-tg-summary').style.display = 'none';
      showAlertMsg('error', 'Số tiền trả trước phải nhỏ hơn giá máy mới để mua trả góp!');
      return;
    }

    var tienMoiKy = 0;
    if (isCTTC) {
      tienMoiKy = Number(document.getElementById('tm-tg-tienMoiKyInput').value) || 0;
    } else {
      tienMoiKy = Math.ceil(conLai / soKy);
      document.getElementById('tm-tg-tienMoiKyInput').value = tienMoiKy;
    }

    var summary = document.getElementById('tm-tg-summary');
    summary.style.display = 'block';

    var html =
      '<div class="summary-row"><span>Giá máy mới:</span><span>' + formatNumber(giaMayMoi) + ' đ</span></div>' +
      '<div class="summary-row"><span>Trả trước:</span><span>' + formatNumber(traTruoc) + ' đ</span></div>' +
      '<div class="summary-row"><span>Còn lại cần góp:</span><span>' + formatNumber(conLai) + ' đ</span></div>' +
      '<div class="summary-row"><span>Số kỳ:</span><span>' + soKy + ' kỳ</span></div>';

    if (isCTTC) {
      html += '<div class="summary-row summary-total"><span>Mỗi kỳ (thực đóng):</span><span>' + formatNumber(tienMoiKy) + ' đ</span></div>';
    } else {
      html += '<div class="summary-row summary-total"><span>Mỗi kỳ:</span><span>' + formatNumber(tienMoiKy) + ' đ</span></div>';
    }
    summary.innerHTML = html;
    updateSplitPaymentAmounts('tm');
  }

  function tinhThuMuaChenhLech() {
    var loai = document.getElementById('tm-loaiGD').value;
    var giaThu = Number(document.getElementById('tm-giaThuMua').value) || 0;
    var summary = document.getElementById('tm-summary');

    if (loai === 'Bán thẳng') {
      summary.innerHTML = '';
      return;
    }

    var giaMoi = getThuMuaGiaMayMoi();

    var hoTro = Number(document.getElementById('tm-tienHoTro').value) || 0;
    var giamGia = Number(document.getElementById('tm-tienGiamGia').value) || 0;
    var valueMoiSauGiam = giaMoi - giamGia;
    var chenhLech = (valueMoiSauGiam - hoTro) - giaThu;

    var html = '<strong>Giá bán máy mới:</strong> ' + formatNumber(giaMoi) + ' đ<br>';
    if (giamGia > 0) {
      html += '<strong>Giảm giá máy mới:</strong> -' + formatNumber(giamGia) + ' đ<br>';
      html += '<strong>Giá sau giảm:</strong> ' + formatNumber(valueMoiSauGiam) + ' đ<br>';
    }
    html += '<strong>Tiền hỗ trợ:</strong> -' + formatNumber(hoTro) + ' đ<br>' +
               '<strong>Giá thu mua máy cũ:</strong> -' + formatNumber(giaThu) + ' đ<br>';

    if (chenhLech >= 0) {
      html += '<strong style="color: #1a73e8;">Khách cần trả thêm: ' + formatNumber(chenhLech) + ' đ</strong>';
    } else {
      html += '<strong style="color: #137333;">Cửa hàng trả lại khách: ' + formatNumber(Math.abs(chenhLech)) + ' đ</strong>';
    }

    summary.innerHTML = html;

    // Cập nhật tính toán trả góp nếu hình thức bán là Trả góp
    var htb = document.getElementById('tm-hinhThucBan').value;
    if (htb === 'Trả góp') {
      tinhThuMuaTraGop();
    }
    updateSplitPaymentAmounts('tm');
  }

  function tinhThanhTien() {
    var source = document.getElementById('dh-nguonSP').value;
    if (source === 'Phụ kiện') {
      tinhTongTienAcc();
      return;
    }

    var soLuong = Number(document.getElementById('dh-soLuong').value) || 0;
    var donGia = Number(document.getElementById('dh-donGia').value) || 0;
    var giamGia = Number(document.getElementById('dh-tienGiamGia').value) || 0;
    var thanhTien = (soLuong * donGia) - giamGia;

    var summary = document.getElementById('dh-summary');
    summary.style.display = 'block';
    summary.innerHTML = '<div class="summary-row summary-total"><span>Thành tiền:</span><span>' +
      formatNumber(thanhTien) + ' đ</span></div>';

    if (document.getElementById('dh-hinhThucBan').value === 'Trả góp') {
      tinhTraGop();
    }
    updateSplitPaymentAmounts('dh');
  }

  function tinhTraGop() {
    var thanhTien = getDonHangThanhTien();
    
    var traTruoc = 0;
    var httt = document.getElementById('dh-hinhThucTT') ? document.getElementById('dh-hinhThucTT').value : '';
    if (httt === 'Hỗn hợp') {
      var tm = Number(document.getElementById('dh-split-tienMat').value) || 0;
      var ck = Number(document.getElementById('dh-split-chuyenKhoan').value) || 0;
      traTruoc = tm + ck;
    } else {
      traTruoc = Number(document.getElementById('tg-traTruoc').value) || 0;
    }

    var soKy = Number(document.getElementById('tg-soKy').value) || 1;
    var conLai = thanhTien - traTruoc;

    if (conLai <= 0) {
      document.getElementById('tg-summary').style.display = 'none';
      showAlertMsg('error', 'Số tiền trả trước phải nhỏ hơn tổng tiền đơn hàng để mua trả góp!');
      return;
    }

    var loai = document.getElementById('tg-loai').value;
    var isCTTC = (loai === 'Công ty tài chính');

    document.getElementById('tg-congTyTCGroup').style.display = isCTTC ? 'block' : 'none';
    document.getElementById('tg-tienMoiKyGroup').style.display = isCTTC ? 'block' : 'none';

    var tienMoiKy = 0;
    if (isCTTC) {
      tienMoiKy = Number(document.getElementById('tg-tienMoiKyInput').value) || 0;
    } else {
      tienMoiKy = Math.ceil(conLai / soKy);
      document.getElementById('tg-tienMoiKyInput').value = tienMoiKy;
    }

    var summary = document.getElementById('tg-summary');
    summary.style.display = 'block';

    var html =
      '<div class="summary-row"><span>Tổng tiền:</span><span>' + formatNumber(thanhTien) + ' đ</span></div>' +
      '<div class="summary-row"><span>Trả trước:</span><span>' + formatNumber(traTruoc) + ' đ</span></div>' +
      '<div class="summary-row"><span>Còn lại:</span><span>' + formatNumber(conLai) + ' đ</span></div>' +
      '<div class="summary-row"><span>Số kỳ:</span><span>' + soKy + ' kỳ</span></div>';

    if (isCTTC) {
      html += '<div class="summary-row summary-total"><span>Mỗi kỳ (thực đóng):</span><span>' + formatNumber(tienMoiKy) + ' đ</span></div>';
    } else {
      html += '<div class="summary-row summary-total"><span>Mỗi kỳ:</span><span>' + formatNumber(tienMoiKy) + ' đ</span></div>';
    }
    summary.innerHTML = html;
    updateSplitPaymentAmounts('dh');
  }

  function submitDonHang() {
    var chiNhanh = document.getElementById('dh-chiNhanh').value;

    var nguonSP = document.getElementById('dh-nguonSP').value;
    var nguoiBan = extractId(document.getElementById('dh-nguoiBan').value);

    if (!chiNhanh || !maKH || !nguoiBan) {
      showAlertMsg('error', 'Vui lòng chọn Chi nhánh, Khách hàng và Người bán!');
      return;
    }

    var data = {
      chiNhanh: chiNhanh,
      maKH: maKH,
      tenKH: extractCustomerName(document.getElementById('dh-maKH').value),
      nguonSP: nguonSP,
      tienGiamGia: Number(document.getElementById('dh-tienGiamGia').value) || 0,
      hinhThucBan: document.getElementById('dh-hinhThucBan').value,
      hinhThucThanhToan: getPaymentMethodString('dh'),
      nguoiBan: nguoiBan,
      nguoiHoTro: extractId(document.getElementById('dh-nguoiHoTro').value),
      ghiChu: document.getElementById('dh-ghiChu').value
    };

    if (document.getElementById('dh-hinhThucTT').value === 'Hỗn hợp') {
      data.splitTienMat = Number(document.getElementById('dh-split-tienMat').value) || 0;
      data.splitChuyenKhoan = Number(document.getElementById('dh-split-chuyenKhoan').value) || 0;
    }

    if (nguonSP === 'Phụ kiện') {
      var rows = document.querySelectorAll('#dh-accessories-list tr');
      if (rows.length === 0) {
        showAlertMsg('error', 'Vui lòng chọn ít nhất một phụ kiện để tạo đơn!');
        return;
      }
      data.items = [];
      for (var i = 0; i < rows.length; i++) {
        var row = rows[i];
        var id = row.getAttribute('data-id');
        var qty = parseInt(row.querySelector('.acc-qty').value) || 1;
        var price = parseFloat(row.querySelector('.acc-price').value) || 0;
        data.items.push({
          maSP: id,
          soLuong: qty,
          donGia: price
        });
      }
    } else {
      var maSP = extractId(document.getElementById('dh-maSP').value);
      var imei = extractImei(document.getElementById('dh-maSP').value);

      if (!maSP) {
        showAlertMsg('error', 'Vui lòng chọn Sản phẩm cần bán!');
        return;
      }

      data.maSP = maSP;
      data.imei = imei;
      data.soLuong = Number(document.getElementById('dh-soLuong').value) || 1;
      data.donGia = Number(document.getElementById('dh-donGia').value) || 0;
      data.coNhanQua = document.getElementById('dh-coNhanQua').value;
      data.maQuaTang = extractId(document.getElementById('dh-maQuaTang').value, true);

      if (data.hinhThucBan === 'Trả góp') {
        data.traGop = {
          traTruoc: (document.getElementById('dh-hinhThucTT').value === 'Hỗn hợp')
            ? (Number(document.getElementById('dh-split-chuyenKhoan').value) + Number(document.getElementById('dh-split-tienMat').value))
            : (Number(document.getElementById('tg-traTruoc').value) || 0),
          soKy: Number(document.getElementById('tg-soKy').value) || 6,
          loaiTraGop: document.getElementById('tg-loai').value,
          congTyTC: document.getElementById('tg-congTyTC').value,
          tienMoiKy: Number(document.getElementById('tg-tienMoiKyInput').value) || 0
        };
      }
    }

    if (data.hinhThucBan === 'Trả góp' && data.traGop) {
      var traTruocVal = 0;
      if (document.getElementById('dh-hinhThucTT').value === 'Hỗn hợp') {
        var tm = Number(document.getElementById('dh-split-tienMat').value) || 0;
        var ck = Number(document.getElementById('dh-split-chuyenKhoan').value) || 0;
        traTruocVal = tm + ck;
      } else {
        traTruocVal = Number(document.getElementById('tg-traTruoc').value) || 0;
      }
      var totalVal = getDonHangThanhTien();
      if (traTruocVal >= totalVal) {
        showAlertMsg('error', 'Số tiền trả trước phải nhỏ hơn tổng tiền đơn hàng để mua trả góp!');
        return;
      }
    }

    setLoading('btnTaoDonHang', true);
    google.script.run
      .withSuccessHandler(function(maDH) {
        setLoading('btnTaoDonHang', false);
        showAlertMsg('success', 'Đã tạo đơn hàng: <strong>' + maDH + '</strong>');
        resetFormDonHang();
        preloadInventoryData(onDonHangBranchOrNguonChange);
      })
      .withFailureHandler(function(err) {
        setLoading('btnTaoDonHang', false);
        showAlertMsg('error', 'Lỗi: ' + err.message);
      })
      .taoDonHang(data);
  }

      if (htb === 'Trả góp') {

        if (tmHttt === 'Hỗn hợp') {
          var tm = Number(document.getElementById('tm-Moi-split-tienMat').value) || 0;
          var ck = Number(document.getElementById('tm-Moi-split-chuyenKhoan').value) || 0;

  function extractCustomerName(str) {
    if (!str) return '';
    var parts = str.split(' - ');
    if (parts.length > 1) {
      var namePart = parts[1].trim();
      return namePart.replace(/\s*\(.*?\)$/, '');
    }
    return str;
  }

  function onKHChange(prefix) {
    var inputEl = document.getElementById(prefix + '-khachHang');
    var maKHEl = document.getElementById(prefix + '-maKH');
    var sdtEl = document.getElementById(prefix + '-sdtKH');
    if (!inputEl) return;

    var val = inputEl.value;
    if (!val) {
      if (maKHEl) maKHEl.value = '';
      if (sdtEl) sdtEl.value = '';
      return;
    }

    var parts = val.split(' - ');
    var maKH = parts[0].trim();
    if (maKHEl) maKHEl.value = maKH;

    if (sdtEl) {
      var match = val.match(/\((.*?)\)$/);
      if (match) {
        sdtEl.value = match[1].trim();
      } else if (/^\d+$/.test(maKH)) {
        sdtEl.value = maKH;
      }
    }
  }

  // ==================== HYBRID PAYMENT FUNCTIONS ====================

  function getDonHangThanhTien() {
    var giamGia = Number(document.getElementById('dh-tienGiamGia').value) || 0;
    var sourceSelect = document.getElementById('dh-nguonSP');
    var source = sourceSelect ? sourceSelect.value : '';
    if (source === 'Phụ kiện') {
      var rows = document.querySelectorAll('#dh-accessories-list tr');
      var grandTotal = 0;
      rows.forEach(function(row) {
        var qty = parseInt(row.querySelector('.acc-qty').value) || 0;
        var price = parseFloat(row.querySelector('.acc-price').value) || 0;
        grandTotal += (qty * price);
      });
      return Math.max(0, grandTotal - giamGia);
    } else {
      var soLuong = Number(document.getElementById('dh-soLuong').value) || 0;
      var donGia = Number(document.getElementById('dh-donGia').value) || 0;
      return Math.max(0, (soLuong * donGia) - giamGia);
    }
  }

  function onPaymentMethodChange(prefix) {
    var selectEl = document.getElementById(prefix + '-hinhThucTT');
    var httt = selectEl.value;
    var splitRow = document.getElementById(prefix + '-split-payment-row');
    if (!splitRow) return;

    if (httt === 'Hỗn hợp') {
      splitRow.style.display = 'flex';
      
      var htb = '';
      if (prefix === 'dh') {
        htb = document.getElementById('dh-hinhThucBan') ? document.getElementById('dh-hinhThucBan').value : '';
      } else if (prefix === 'tm-Moi') {
        htb = document.getElementById('tm-hinhThucBan') ? document.getElementById('tm-hinhThucBan').value : '';
      }

      var total = 0;
      if (htb === 'Trả góp' && prefix === 'dh') {
        total = getDonHangThanhTien();
      } else {
        total = getAmountToPay(prefix);
      }

      document.getElementById(prefix + '-split-tienMat').value = total;
      document.getElementById(prefix + '-split-chuyenKhoan').value = 0;

      // Màu sắc theo tông màu của từng phân hệ
      if (prefix === 'dh' || prefix === 'tt' || prefix === 'dv' || prefix === 'tm-Moi') {
        selectEl.style.background = '#e8f0fe';
        selectEl.style.borderColor = '#a8c7fa';
      } else if (prefix === 'tm-Thu') {
        selectEl.style.background = '#f1f3f4';
        selectEl.style.borderColor = '#dadce0';
      } else if (prefix === 'dt') {
        selectEl.style.background = '#fdf3f3';
        selectEl.style.borderColor = '#f5c6cb';
      }
    } else {
      splitRow.style.display = 'none';
      document.getElementById(prefix + '-split-tienMat').value = 0;
      document.getElementById(prefix + '-split-chuyenKhoan').value = 0;

      // Khôi phục mặc định
      selectEl.style.background = '#fff';
      selectEl.style.borderColor = '#dadce0';
    }

    // Xử lý ẩn/hiện ô Trả trước khi chọn Hỗn hợp + Trả góp
    if (prefix === 'dh') {
      var htb = document.getElementById('dh-hinhThucBan') ? document.getElementById('dh-hinhThucBan').value : '';
      var traTruocGroup = document.getElementById('tg-traTruoc') ? document.getElementById('tg-traTruoc').closest('.form-group') : null;
      if (traTruocGroup) {
        if (htb === 'Trả góp' && httt === 'Hỗn hợp') {
          traTruocGroup.style.display = 'none';
        } else {
          traTruocGroup.style.display = '';
        }
      }
      if (htb === 'Trả góp') {
        tinhTraGop();
      }
    } else if (prefix === 'tm') {
      var htb = document.getElementById('tm-hinhThucBan') ? document.getElementById('tm-hinhThucBan').value : '';
      var traTruocGroup = document.getElementById('tm-tg-traTruoc') ? document.getElementById('tm-tg-traTruoc').closest('.form-group') : null;
      if (traTruocGroup) {
        if (htb === 'Trả góp' && httt === 'Hỗn hợp') {
          traTruocGroup.style.display = 'none';
        } else {
          traTruocGroup.style.display = '';
        }
      }
      if (htb === 'Trả góp') {
        tinhThuMuaTraGop();
      }
    }
  }

  function getAmountToPay(prefix) {
    if (prefix === 'dh') {
      var htb = document.getElementById('dh-hinhThucBan').value;
      if (htb === 'Trả góp') {
        var httt = document.getElementById('dh-hinhThucTT') ? document.getElementById('dh-hinhThucTT').value : '';
        if (httt === 'Hỗn hợp') {
          var tm = Number(document.getElementById('dh-split-tienMat').value) || 0;
          var ck = Number(document.getElementById('dh-split-chuyenKhoan').value) || 0;
          return tm + ck;
        }
        return Number(document.getElementById('tg-traTruoc').value) || 0;
      }
      return getDonHangThanhTien();
    } else if (prefix === 'tm-Thu') {
      var giaThu = Number(document.getElementById('tm-giaThuMua').value) || 0;
      var loai = document.getElementById('tm-loaiGD').value;
      if (loai === 'Thu cũ đổi mới') {
        var hoTro = Number(document.getElementById('tm-tienHoTro').value) || 0;
        return giaThu + hoTro;
      }
      return giaThu;
    } else if (prefix === 'tm-Moi') {
      var htb = document.getElementById('tm-hinhThucBan').value;
      if (htb === 'Trả góp') {
        return Number(document.getElementById('tm-tg-traTruoc').value) || 0;
      }
      var giaMoi = getThuMuaGiaMayMoi();
      var giamGia = Number(document.getElementById('tm-tienGiamGia').value) || 0;
      return Math.max(0, giaMoi - giamGia);
    } else if (prefix === 'dt') {
      return Math.abs(Number(document.getElementById('dt-tienHoanTra').value) || 0);
    } else if (prefix === 'tt') {
      return Number(document.getElementById('tt-soTien').value) || 0;
    } else if (prefix === 'dv') {
      var soTien = Number(document.getElementById('dv-soTien').value) || 0;
      var phi = Number(document.getElementById('dv-phi').value) || 0;
      return soTien + phi;
    } else if (prefix === 'bh') {
      return Number(document.getElementById('bh-phiSuaChua').value) || 0;
    }
    return 0;
  }

  function validateSplitPayment(prefix, inputName) {
    var activeId = document.activeElement ? document.activeElement.id : '';
    var edited = inputName;
    if (!edited) {
      if (activeId === prefix + '-split-chuyenKhoan') {
        edited = 'chuyenKhoan';
      } else {
        edited = 'tienMat';
      }
    }

    var tmInput = document.getElementById(prefix + '-split-tienMat');
    var ckInput = document.getElementById(prefix + '-split-chuyenKhoan');
    if (!tmInput || !ckInput) return;

    var tm = Number(tmInput.value) || 0;
    var ck = Number(ckInput.value) || 0;

    var htb = '';
    if (prefix === 'dh') {
      htb = document.getElementById('dh-hinhThucBan') ? document.getElementById('dh-hinhThucBan').value : '';
    } else if (prefix === 'tm') {
      htb = document.getElementById('tm-hinhThucBan') ? document.getElementById('tm-hinhThucBan').value : '';
    }
    
    var httt = document.getElementById(prefix + '-hinhThucTT') ? document.getElementById(prefix + '-hinhThucTT').value : '';

    if (htb === 'Trả góp' && httt === 'Hỗn hợp') {
      if (prefix === 'dh') {
        var thanhTien = getDonHangThanhTien();
        var maxAllowed = Math.max(0, thanhTien - 1000);
        if (edited === 'tienMat') {
          if (tm < 0) tm = 0;
          if (tm > maxAllowed) tm = maxAllowed;
          if (tm + ck > maxAllowed) {
            ck = maxAllowed - tm;
          }
        } else {
          if (ck < 0) ck = 0;
          if (ck > maxAllowed) ck = maxAllowed;
          if (tm + ck > maxAllowed) {
            tm = maxAllowed - ck;
          }
        }
        tmInput.value = tm;
        ckInput.value = ck;
        tinhTraGop();
      } else if (prefix === 'tm') {
        var giaThu = Number(document.getElementById('tm-giaThuMua').value) || 0;
        var giaMoi = getThuMuaGiaMayMoi();
        var hoTro = Number(document.getElementById('tm-tienHoTro').value) || 0;
        var giamGia = Number(document.getElementById('tm-tienGiamGia').value) || 0;
        var giaMayMoi = giaMoi - giamGia - hoTro;
        
        var minPayback = Math.max(0, giaThu - giaMayMoi + 1000);
        var maxPayback = giaThu;

        if (edited === 'tienMat') {
          if (tm < 0) tm = 0;
          if (tm > maxPayback) tm = maxPayback;
          if (tm + ck > maxPayback) {
            ck = maxPayback - tm;
          } else if (tm + ck < minPayback) {
            ck = minPayback - tm;
          }
        } else {
          if (ck < 0) ck = 0;
          if (ck > maxPayback) ck = maxPayback;
          if (tm + ck > maxPayback) {
            tm = maxPayback - ck;
          } else if (tm + ck < minPayback) {
            tm = minPayback - ck;
          }
        }
        tmInput.value = tm;
        ckInput.value = ck;
        tinhThuMuaTraGop();
      }
    } else {
      var total = getAmountToPay(prefix);
      if (edited === 'tienMat') {
        if (tm > total) {
          tm = total;
        } else if (tm < 0) {
          tm = 0;
        }
        tmInput.value = tm;
        ckInput.value = total - tm;
      } else {
        if (ck > total) {
          ck = total;
        } else if (ck < 0) {
          ck = 0;
        }
        ckInput.value = ck;
        tmInput.value = total - ck;
      }
    }
  }

  function updateSplitPaymentAmounts(prefix) {
    var htttSelect = document.getElementById(prefix + '-hinhThucTT');
    if (!htttSelect) return;
    var httt = htttSelect.value;
    if (httt !== 'Hỗn hợp') return;

    var htb = '';
    if (prefix === 'dh') {
      htb = document.getElementById('dh-hinhThucBan') ? document.getElementById('dh-hinhThucBan').value : '';
    } else if (prefix === 'tm') {
      htb = document.getElementById('tm-hinhThucBan') ? document.getElementById('tm-hinhThucBan').value : '';
    }

    var tmInput = document.getElementById(prefix + '-split-tienMat');
    var ckInput = document.getElementById(prefix + '-split-chuyenKhoan');
    if (!tmInput || !ckInput) return;

    if (htb === 'Trả góp' && httt === 'Hỗn hợp') {
      validateSplitPayment(prefix, 'tienMat');
      return;
    }

    var total = getAmountToPay(prefix);
    var tm = Number(tmInput.value) || 0;
    var ck = total - tm;
    if (ck < 0) {
      ck = 0;
      tm = total;
    }
    tmInput.value = tm;
    ckInput.value = ck;
  }

  function formatPaymentAmount(n) {
    return Math.round(Number(n) || 0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  }

  function getPaymentMethodString(prefix) {
    return document.getElementById(prefix + '-hinhThucTT').value;
  }

  function onLoaiDichVuBHChange() {
    // Không cần logic đặc biệt, chỉ là thay đổi text nếu muốn
  }

  function submitBaoHanh() {
    var data = {
      chiNhanh: document.getElementById('bh-chiNhanh').value,
      loaiDichVu: document.getElementById('bh-loaiDichVu').value,
      tenKH: extractCustomerName(document.getElementById('bh-khachHang').value),
      maKH: document.getElementById('bh-maKH').value || extractId(document.getElementById('bh-khachHang').value),
      soDienThoaiKH: document.getElementById('bh-sdtKH').value,
      tenSP: document.getElementById('bh-tenSP').value,
      tinhTrangLoi: document.getElementById('bh-tinhTrangLoi').value,
      phiSuaChua: Number(document.getElementById('bh-phiSuaChua').value) || 0,
      hinhThucThanhToan: document.getElementById('bh-hinhThucTT').value,
      splitTienMat: Number(document.getElementById('bh-split-tienMat').value) || 0,
      splitChuyenKhoan: Number(document.getElementById('bh-split-chuyenKhoan').value) || 0,
      nguoiTiepNhan: extractId(document.getElementById('bh-nguoiTiepNhan').value),
      nguoiSua: extractId(document.getElementById('bh-nguoiSua').value),
      ghiChu: document.getElementById('bh-ghiChu').value
    };

    if (!data.chiNhanh) return showAlertMsg('error', 'Vui lòng chọn chi nhánh!');
    if (!data.tenKH) return showAlertMsg('error', 'Vui lòng nhập tên khách hàng!');
    if (!data.tenSP) return showAlertMsg('error', 'Vui lòng nhập tên sản phẩm!');
    if (!data.tinhTrangLoi) return showAlertMsg('error', 'Vui lòng nhập tình trạng lỗi!');
    if (!data.nguoiTiepNhan) return showAlertMsg('error', 'Vui lòng chọn người tiếp nhận!');

    if (data.hinhThucThanhToan === 'Hỗn hợp') {
      if (Math.abs(data.splitTienMat + data.splitChuyenKhoan - data.phiSuaChua) > 1) {
        return showAlertMsg('error', 'Tổng số tiền chia không khớp với Phí sửa chữa!');
      }
    }

    setLoading('btnTaoBH', true);
    google.script.run
      .withSuccessHandler(function(res) {
        setLoading('btnTaoBH', false);
        showAlertMsg('success', 'Tạo Phiếu Tiếp Nhận thành công: ' + res);
        document.getElementById('bh-khachHang').value = '';
        document.getElementById('bh-maKH').value = '';
        document.getElementById('bh-sdtKH').value = '';
        document.getElementById('bh-tenSP').value = '';
        document.getElementById('bh-tinhTrangLoi').value = '';
        document.getElementById('bh-phiSuaChua').value = '0';
        document.getElementById('bh-split-tienMat').value = '0';
        document.getElementById('bh-split-chuyenKhoan').value = '0';
        document.getElementById('bh-nguoiSua').value = '';
        document.getElementById('bh-ghiChu').value = '';
        updateSplitPaymentAmounts('bh');
      })
      .withFailureHandler(function(err) {
        setLoading('btnTaoBH', false);
        showAlertMsg('error', err.message);
      })
      .taoBaoHanh(data);
  }

  // ==================== INIT ====================
  init();
</script>
