<script>
  // escapeHtml helper to prevent XSS
  function escapeHtml(text) {
    if (text === null || text === undefined) return "";
    let map = {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    };
    return String(text).replace(/[&<>"']/g, function(m) { return map[m]; });
  }

  // ==================== NAV TABS ====================
  document.querySelectorAll('.nav-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      // Update active tab
      document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');

      // Show corresponding section
      let sectionId = 'section-' + this.dataset.section;
      document.querySelectorAll('.form-section').forEach(function(s) { s.classList.remove('active'); });
      let activeSec = document.getElementById(sectionId);
      if (activeSec) activeSec.classList.add('active');

      hideAlert();
    });
  });

  // ==================== ALERT ====================
  function showAlertMsg(type, msg) {
    let box = document.getElementById('alertBox');
    box.className = 'alert alert-' + type + ' show';
    if (type === 'success' || type === 'info') {
      box.innerHTML = escapeHtml(msg).replace(/\n/g, '<br>');
    } else {
      box.textContent = msg;
    }
    // Auto hide after 5s for success
    if (type === 'success') {
      setTimeout(function() { box.classList.remove('show'); }, 5000);
    }
  }

  function hideAlert() {
    document.getElementById('alertBox').classList.remove('show');
  }

  // ==================== LOADING ====================
  function setLoading(btnId, loading) {
    let btn = document.getElementById(btnId);
    if (!btn) return;
    if (loading) {
      btn.disabled = true;
      btn.dataset.originalText = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span> Đang xử lý...';
    } else {
      btn.disabled = false;
      btn.innerHTML = btn.dataset.originalText || btn.innerHTML;
    }
  }

  // ==================== INIT — LOAD DATA ====================
  function init() {
    // Set default month/year for Doanh số
    let now = new Date();
    let curMonth = now.getMonth() + 1;
    let curYear = now.getFullYear();
    let dsThang = document.getElementById('ds-thang');
    if (dsThang) dsThang.value = curMonth;
    let dsNam = document.getElementById('ds-nam');
    if (dsNam) dsNam.value = curYear;

    // Load all initial metadata and inventory preloads in a single combined request
    google.script.run.withSuccessHandler(function(data) {
      if (!data) return;

      // 1. Inventory preload data
      if (data.preloadData) {
        localCache.dienThoai = data.preloadData.dienThoai || [];
        localCache.phuKien = data.preloadData.phuKien || [];
        localCache.phuKienUnique = data.preloadData.phuKienUnique || [];
      }

      // Lưu trữ lãi suất trả góp cửa hàng
      window.storeInterestRate = (data.preloadData && data.preloadData.storeInterestRate) || 0;

      // 2. Branches
      if (data.branches) {
        branchesCached = data.branches;
        populateSelect('dh-chiNhanh', data.branches);
        populateSelect('nk-chiNhanh', data.branches);
        populateSelect('dv-chiNhanh', data.branches);
        populateSelect('ck-cnNguon', data.branches);
        populateSelect('ck-cnDich', data.branches);
        populateSelect('dt-chiNhanh', data.branches);
        populateSelect('tm-chiNhanh', data.branches);
        populateSelect('bh-chiNhanh', data.branches);
      }

      // 3. Staff (Employees)
      if (data.staff) {
        populateDatalist('dh-nguoiBan', 'dh-nguoiBan-list', data.staff);
        populateDatalist('dh-nguoiHoTro', 'dh-nguoiHoTro-list', data.staff, true);
        populateDatalist('dv-nguoiThucHien', 'dv-nguoiThucHien-list', data.staff);
        populateDatalist('dt-nguoiThucHien', 'dt-nguoiThucHien-list', data.staff);
        populateDatalist('tm-nguoiThucHien', 'tm-nguoiThucHien-list', data.staff);
        populateDatalist('tm-nguoiHoTro', 'tm-nguoiHoTro-list', data.staff, true);
        populateDatalist('bh-nguoiTiepNhan', 'bh-nguoiTiepNhan-list', data.staff);
        populateDatalist('bh-nguoiSua', 'bh-nguoiSua-list', data.staff);
      }

      // 4. Finance companies
      if (data.financeCompanies) {
        populateSelect('tg-congTyTC', data.financeCompanies);
        populateSelect('tm-tg-congTyTC', data.financeCompanies);
      }

      // 5. Brands
      if (data.brands) {
        populateSelect('nk-thuongHieu', data.brands);
        populateSelect('tm-thuongHieu-Thu', data.brands);
      }

      // Load initial mode tab (needs to run after populate select/datalists)
      if (typeof initialMode !== 'undefined' && initialMode) {
        let activeTab = document.querySelector('.nav-tab[data-section="' + initialMode + '"]');
        if (activeTab) {
          activeTab.click();
        }
      }
    }).getInitialSidebarData();

    // Preload khách hàng trong background sau 1.5 giây để tìm kiếm nhanh
    setTimeout(function() {
      google.script.run.withSuccessHandler(function(items) {
        localCache.khachHang = items || [];
      }).getKhachHangDropdown();
    }, 1500);

    // Set up dynamic search (>= 4 characters, or local search if cached) for large datasets
    setupDatalistSearch('dh-maKH', 'dh-maKH-list', function(query, callback) {
      if (localCache.khachHang) {
        callback(searchKhachHangLocal(query));
      } else {
        google.script.run.withSuccessHandler(callback).getKhachHangDropdownSearch(query);
      }
    });
    setupDatalistSearch('tm-maKH', 'tm-maKH-list', function(query, callback) {
      if (localCache.khachHang) {
        callback(searchKhachHangLocal(query));
      } else {
        google.script.run.withSuccessHandler(callback).getKhachHangDropdownSearch(query);
      }
    });
    setupDatalistSearch('bh-maKH', 'bh-maKH-list', function(query, callback) {
      if (localCache.khachHang) {
        callback(searchKhachHangLocal(query));
      } else {
        google.script.run.withSuccessHandler(callback).getKhachHangDropdownSearch(query);
      }
    });
    setupDatalistSearch('dv-maKH', 'dv-maKH-list', function(query, callback) {
      if (localCache.khachHang) {
        callback(searchKhachHangLocal(query));
      } else {
        google.script.run.withSuccessHandler(callback).getKhachHangDropdownSearch(query);
      }
    });
    setupDatalistSearch('dh-maSP', 'dh-maSP-list', function(query, callback) {
      let branch = document.getElementById('dh-chiNhanh').value;
      let source = document.getElementById('dh-nguonSP').value;
      if (!branch) return callback([]);
      if (source === 'Điện thoại') {
        callback(searchDienThoaiLocal(branch, query));
      } else {
        callback(searchPhuKienLocal(branch, query));
      }
    });
    setupDatalistSearch('ck-maSP', 'ck-maSP-list', function(query, callback) {
      let branch = document.getElementById('ck-cnNguon').value;
      if (!branch) return callback([]);
      callback(searchDienThoaiLocal(branch, query));
    });
    setupDatalistSearch('dt-maSP-Nhan', 'dt-maSP-Nhan-list', function(query, callback) {
      let branch = document.getElementById('dt-chiNhanh').value;
      if (!branch) return callback([]);
      let doiTuong = document.getElementById('dt-doiTuong').value;
      if (doiTuong === 'Quà tặng kèm') {
        callback(searchPhuKienLocal(branch, query));
      } else {
        let loaiGD = document.getElementById('dt-loaiGD').value;
        if (loaiGD === 'Đổi máy') {
          callback(searchDienThoaiLocal(branch, query));
        } else {
          callback(searchPhuKienLocal(branch, query));
        }
      }
    });
    setupDatalistSearch('tm-maSP-Moi', 'tm-maSP-Moi-list', function(query, callback) {
      let branch = document.getElementById('tm-chiNhanh').value;
      if (!branch) return callback([]);
      callback(searchDienThoaiLocal(branch, query));
    });
    setupDatalistSearch('tt-maTG', 'tt-maTG-list', function(query, callback) {
      google.script.run.withSuccessHandler(callback).getTraGopDropdownSearch(query);
    });
    setupDatalistSearch('nk-pkCu-maSP', 'nk-pkCu-maSP-list', function(query, callback) {
      callback(searchPhuKienUniqueLocal(query));
    });

    setupMultiSelectDatalist('dh-maQuaTang', 'dh-maQuaTang-list');
    setupMultiSelectDatalist('tm-maQuaTang', 'tm-maQuaTang-list');
  }
</script>
